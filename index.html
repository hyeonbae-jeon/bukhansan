<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북한산 연구 논문 아카이브</title>
<style>
:root {
  --primary: #2d6a4f;
  --primary-light: #52b788;
  --secondary: #40916c;
  --bg: #f4f6f8;
  --card-bg: #ffffff;
  --border: #d1d5db;
  --text: #111827;
  --text-muted: #6b7280;
  --cat-resource: #2563eb;
  --cat-disaster: #dc2626;
  --cat-tour: #d97706;
  --cat-ecology: #059669;
  --cat-history: #7c3aed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
/* ── Header ── */
header {
  background: var(--primary);
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 2px solid rgba(0,0,0,.15);
}
.header-title { font-size: 18px; font-weight: 700; }
.header-sub { font-size: 11px; opacity: .75; margin-top: 2px; }
.header-stats { display: flex; gap: 24px; }
.stat { text-align: right; }
.stat-num { font-size: 22px; font-weight: 700; line-height: 1.1; }
.stat-label { font-size: 10px; opacity: .75; }
/* ── Layout ── */
.body-wrap {
  display: grid;
  grid-template-columns: 320px 1fr;
  flex: 1;
  overflow: hidden;
}
/* ── Sidebar ── */
.sidebar {
  background: var(--card-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-row { display: flex; gap: 6px; margin-bottom: 10px; }
.search-input {
  flex: 1; padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px; outline: none;
}
.search-input:focus { border-color: var(--primary-light); }
.btn {
  padding: 7px 13px; background: var(--primary);
  color: #fff; border: none; border-radius: 6px;
  font-size: 12px; font-weight: 600; cursor: pointer;
}
.btn:hover { background: var(--secondary); }
.cat-tabs { display: flex; flex-wrap: wrap; gap: 5px; }
.cat-btn {
  padding: 4px 10px; border: 1px solid var(--border);
  border-radius: 4px; background: #fff; font-size: 11px;
  font-weight: 600; cursor: pointer; color: var(--text);
}
.cat-btn.active-all  { background: var(--primary);      border-color: var(--primary);      color: #fff; }
.cat-btn.active-res  { background: var(--cat-resource); border-color: var(--cat-resource); color: #fff; }
.cat-btn.active-dis  { background: var(--cat-disaster); border-color: var(--cat-disaster); color: #fff; }
.cat-btn.active-tour { background: var(--cat-tour);     border-color: var(--cat-tour);     color: #fff; }
.cat-btn.active-eco  { background: var(--cat-ecology);  border-color: var(--cat-ecology);  color: #fff; }
.cat-btn.active-hist { background: var(--cat-history);  border-color: var(--cat-history);  color: #fff; }
.status-bar {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px; padding: 6px 10px;
  background: #fefce8; border: 1px solid #fde68a;
  border-radius: 6px; font-size: 11px; color: #92400e;
}
.status-bar.ok { background: #f0fdf4; border-color: #bbf7d0; color: #14532d; }
.status-bar.err { background: #fef2f2; border-color: #fecaca; color: #7f1d1d; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
.dot.ok  { background: #059669; }
.dot.err { background: #dc2626; }
/* ── Paper list ── */
.paper-list { flex: 1; overflow-y: auto; padding: 10px; }
.paper-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: 7px; padding: 12px 12px 10px;
  margin-bottom: 8px; cursor: pointer;
  transition: border-color .12s;
}
.paper-card:hover { border-color: var(--primary-light); }
.paper-card.sel { border-left: 3px solid var(--primary); border-color: var(--primary); }
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 3px;
  font-size: 10px; font-weight: 700; color: #fff; margin-bottom: 5px;
}
.badge-자원조사 { background: var(--cat-resource); }
.badge-재난    { background: var(--cat-disaster); }
.badge-탐방    { background: var(--cat-tour); }
.badge-생태    { background: var(--cat-ecology); }
.badge-역사문화 { background: var(--cat-history); }
.p-title { font-size: 12px; font-weight: 600; line-height: 1.45; margin-bottom: 4px; }
.p-meta  { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.p-summary {
  font-size: 11px; color: var(--text-muted); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.empty-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
.loading-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
/* ── Detail panel ── */
.detail-panel {
  background: #fff; overflow-y: auto;
  padding: 24px 28px; height: 100%;
}
.detail-placeholder {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 13px; gap: 8px;
}
.detail-placeholder-icon { font-size: 36px; opacity: .3; }
.d-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin: 8px 0 14px; }
.d-meta-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 8px; padding: 10px 14px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 7px; margin-bottom: 16px;
}
.d-meta-item label { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; }
.d-meta-item span  { font-size: 12px; font-weight: 500; }
.d-section-title {
  font-size: 12px; font-weight: 700; color: var(--primary);
  border-bottom: 1px solid var(--border);
  padding-bottom: 3px; margin-bottom: 8px;
}
.d-summary-text { font-size: 13px; line-height: 1.8; margin-bottom: 16px; }
.chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
.chip-kw {
  padding: 3px 9px; background: #f3f4f6;
  border: 1px solid var(--border);
  border-radius: 4px; font-size: 11px;
}
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-riss {
  display: inline-block; padding: 8px 18px;
  background: var(--primary); color: #fff;
  border: none; border-radius: 6px;
  font-size: 12px; font-weight: 600;
  text-decoration: none; cursor: pointer;
}
.btn-riss:hover { background: var(--secondary); }
.btn-fulltext {
  display: inline-block; padding: 8px 18px;
  background: #2563eb; color: #fff;
  border: none; border-radius: 6px;
  font-size: 12px; font-weight: 600;
  text-decoration: none; cursor: pointer;
}
.btn-fulltext:hover { background: #1d4ed8; }
/* ── Updated badge ── */
.updated-tag {
  display: inline-block; margin-top: 12px;
  padding: 3px 8px; background: #f3f4f6;
  border: 1px solid var(--border);
  border-radius: 4px; font-size: 10px; color: var(--text-muted);
}
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">북한산 연구 논문 아카이브</div>
    <div class="header-sub">Bukhansan National Park Research Archive</div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="cnt-total">-</div>
      <div class="stat-label">총 논문</div>
    </div>
    <div class="stat">
      <div class="stat-num">5</div>
      <div class="stat-label">분야</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="cnt-riss">RISS</div>
      <div class="stat-label">데이터 출처</div>
    </div>
  </div>
</header>

<div class="body-wrap">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-row">
        <input type="text" class="search-input" id="searchInput"
          placeholder="제목, 저자, 키워드 검색..."
          onkeydown="if(event.key==='Enter') doSearch()">
        <button class="btn" onclick="doSearch()">검색</button>
      </div>
      <div class="cat-tabs">
        <button class="cat-btn active-all" onclick="setCategory('전체',this)">전체</button>
        <button class="cat-btn" onclick="setCategory('자원조사',this)">자원조사</button>
        <button class="cat-btn" onclick="setCategory('재난',this)">재난</button>
        <button class="cat-btn" onclick="setCategory('탐방',this)">탐방</button>
        <button class="cat-btn" onclick="setCategory('생태',this)">생태</button>
        <button class="cat-btn" onclick="setCategory('역사문화',this)">역사문화</button>
      </div>
      <div class="status-bar" id="statusBar">
        <div class="dot" id="statusDot"></div>
        <span id="statusMsg">데이터 불러오는 중...</span>
      </div>
    </div>
    <div class="paper-list" id="paperList">
      <div class="loading-msg">논문 목록을 불러오는 중입니다...</div>
    </div>
  </aside>

  <!-- Detail -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-placeholder" id="detailPlaceholder">
      <div class="detail-placeholder-icon">&#128196;</div>
      <div>왼쪽 목록에서 논문을 선택하면 상세 내용이 표시됩니다</div>
    </div>
    <div id="detailContent" style="display:none;"></div>
  </div>
</div>

<script>
var allPapers  = [];
var filtered   = [];
var currentCat = "전체";
var currentQuery = "";
var selectedId = null;

var CAT_ACTIVE = {
  "전체": "active-all",
  "자원조사": "active-res",
  "재난": "active-dis",
  "탐방": "active-tour",
  "생태": "active-eco",
  "역사문화": "active-hist"
};

// papers.json 불러오기
function loadPapers() {
  fetch("./papers.json?t=" + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function(data) {
      allPapers = data.papers || [];
      var updated = data.updated ? new Date(data.updated).toLocaleDateString("ko-KR") : "";
      setStatus("ok", "RISS 데이터 " + allPapers.length + "건 로드 완료" + (updated ? " · " + updated : ""));
      document.getElementById("cnt-total").textContent = allPapers.length;
      renderList(allPapers);
    })
    .catch(function(e) {
      setStatus("err", "papers.json 로드 실패 — GitHub Actions를 먼저 실행해주세요");
      document.getElementById("paperList").innerHTML =
        "<div class=\"empty-msg\">GitHub Actions → Fetch RISS Papers → Run workflow 실행 후 새로고침 해주세요</div>";
    });
}

function setStatus(state, msg) {
  var bar = document.getElementById("statusBar");
  var dot = document.getElementById("statusDot");
  bar.className = "status-bar" + (state === "ok" ? " ok" : state === "err" ? " err" : "");
  dot.className = "dot" + (state === "ok" ? " ok" : state === "err" ? " err" : "");
  document.getElementById("statusMsg").textContent = msg;
}

function renderList(papers) {
  filtered = papers;
  var list = document.getElementById("paperList");
  document.getElementById("cnt-total").textContent = papers.length;

  if (!papers.length) {
    list.innerHTML = "<div class=\"empty-msg\">검색 결과가 없습니다</div>";
    return;
  }

  list.innerHTML = papers.map(function(p, idx) {
    var meta = [p.author, p.year, p.journal].filter(Boolean).join(" · ");
    return (
      "<div class=\"paper-card" + (selectedId === p.id ? " sel" : "") + "\" onclick=\"selectPaper(" + idx + ")\">" +
      "<span class=\"badge badge-" + p.category + "\">" + p.category + "</span>" +
      "<div class=\"p-title\">" + esc(p.title) + "</div>" +
      (meta ? "<div class=\"p-meta\">" + esc(meta) + "</div>" : "") +
      "<div class=\"p-summary\">" + esc(p.summary) + "</div>" +
      "</div>"
    );
  }).join("");
}

function selectPaper(idx) {
  var paper = filtered[idx];
  if (!paper) return;
  selectedId = paper.id;

  document.getElementById("detailPlaceholder").style.display = "none";
  var content = document.getElementById("detailContent");
  content.style.display = "block";

  var meta = "";
  if (paper.author || paper.year || paper.journal) {
    meta =
      "<div class=\"d-meta-grid\">" +
      (paper.author  ? "<div class=\"d-meta-item\"><label>저자</label><span>" + esc(paper.author) + "</span></div>" : "") +
      (paper.year    ? "<div class=\"d-meta-item\"><label>발행연도</label><span>" + esc(paper.year) + "</span></div>" : "") +
      (paper.journal ? "<div class=\"d-meta-item\"><label>학술지/출판사</label><span>" + esc(paper.journal) + "</span></div>" : "") +
      "</div>";
  }

  var keywords = "";
  if (paper.keywords && paper.keywords.length) {
    keywords =
      "<div class=\"d-section-title\">키워드</div>" +
      "<div class=\"chip-row\">" +
      paper.keywords.map(function(k){ return "<span class=\"chip-kw\">" + esc(k) + "</span>"; }).join("") +
      "</div>";
  }

  var buttons =
    "<div class=\"btn-group\">" +
    (paper.hasFulltext
      ? "<a href=\"" + paper.rissUrl + "\" target=\"_blank\" class=\"btn-fulltext\">원문 보기</a>"
      : "") +
    "<a href=\"" + paper.rissUrl + "\" target=\"_blank\" class=\"btn-riss\">RISS에서 보기</a>" +
    "</div>";

  content.innerHTML =
    "<span class=\"badge badge-" + paper.category + "\">" + paper.category + "</span>" +
    "<h2 class=\"d-title\">" + esc(paper.title) + "</h2>" +
    meta +
    "<div class=\"d-section-title\">논문 요약</div>" +
    "<div class=\"d-summary-text\">" + esc(paper.summary) + "</div>" +
    keywords +
    buttons;

  // 카드 활성화
  document.querySelectorAll(".paper-card").forEach(function(el, i) {
    el.classList.toggle("sel", i === idx);
  });
}

function setCategory(cat, btn) {
  currentCat = cat;
  document.querySelectorAll(".cat-btn").forEach(function(b) { b.className = "cat-btn"; });
  btn.classList.add(CAT_ACTIVE[cat] || "active-all");
  applyFilter();
}

function doSearch() {
  currentQuery = document.getElementById("searchInput").value.trim();
  applyFilter();
}

function applyFilter() {
  var q = currentQuery.toLowerCase();
  var result = allPapers.filter(function(p) {
    var catOk = currentCat === "전체" || p.category === currentCat;
    var srchOk = !q ||
      p.title.toLowerCase().includes(q) ||
      (p.author || "").toLowerCase().includes(q) ||
      (p.summary || "").toLowerCase().includes(q) ||
      (p.keywords || []).some(function(k){ return k.toLowerCase().includes(q); });
    return catOk && srchOk;
  });
  renderList(result);
}

function esc(s) {
  return (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

window.onload = loadPapers;
</script>
</body>
</html>
