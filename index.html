<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북한산 연구 논문 아카이브</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f4f6f9; color: #222; }

  /* 헤더 */
  header {
    background: #1a5c38;
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header p { font-size: 11px; opacity: 0.75; margin-top: 2px; }
  .header-stats { display: flex; gap: 24px; text-align: right; }
  .stat-item { display: flex; flex-direction: column; align-items: center; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 10px; opacity: 0.75; }

  /* 검색바 */
  .search-bar {
    background: white;
    border-bottom: 1px solid #ddd;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-bar input {
    flex: 1;
    min-width: 200px;
    padding: 8px 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }
  .search-bar input:focus { border-color: #1a5c38; }
  .search-bar button {
    padding: 8px 18px;
    background: #1a5c38;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }

  /* 필터 태그 */
  .filter-bar {
    background: white;
    border-bottom: 1px solid #ddd;
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #ccc;
    background: white;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #1a5c38; color: #1a5c38; }
  .filter-btn.active { background: #1a5c38; color: white; border-color: #1a5c38; }

  /* 상태 메시지 */
  .status-bar {
    padding: 8px 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-bar.success { background: #f0fdf4; color: #166534; }
  .status-bar.error { background: #fef2f2; color: #991b1b; }
  .status-bar.loading { background: #eff6ff; color: #1d4ed8; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  /* 메인 레이아웃 */
  .main { display: flex; height: calc(100vh - 160px); overflow: hidden; }

  /* 논문 목록 */
  .paper-list {
    width: 300px;
    min-width: 260px;
    border-right: 1px solid #ddd;
    overflow-y: auto;
    background: white;
  }
  .paper-count {
    padding: 10px 16px;
    font-size: 12px;
    color: #666;
    border-bottom: 1px solid #eee;
    background: #fafafa;
  }
  .paper-item {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.1s;
  }
  .paper-item:hover { background: #f5f9f6; }
  .paper-item.selected { background: #e8f5ee; border-left: 3px solid #1a5c38; }
  .paper-cat {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    color: white;
    margin-bottom: 5px;
    font-weight: 600;
  }
  .cat-자원조사 { background: #2563eb; }
  .cat-재난 { background: #dc2626; }
  .cat-탐방 { background: #d97706; }
  .cat-생태 { background: #16a34a; }
  .cat-역사문화 { background: #7c3aed; }

  .paper-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 4px;
    color: #111;
  }
  .paper-meta { font-size: 11px; color: #888; }

  /* 상세 보기 */
  .paper-detail {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    background: #fafafa;
  }
  .detail-placeholder {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #aaa;
    gap: 12px;
  }
  .detail-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }

  .detail-cat {
    display: inline-block;
    font-size: 11px;
    padding: 3px 12px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .detail-title {
    font-size: 20px;
    font-weight: 700;
    color: #111;
    line-height: 1.4;
    margin-bottom: 18px;
  }
  .detail-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: #ddd;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .detail-info-cell {
    background: white;
    padding: 12px 16px;
  }
  .detail-info-cell .label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .detail-info-cell .value { font-size: 14px; font-weight: 500; color: #222; }

  .detail-section { margin-bottom: 20px; }
  .detail-section h3 {
    font-size: 13px;
    color: #555;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #eee;
  }
  .detail-abstract {
    font-size: 14px;
    line-height: 1.8;
    color: #333;
    background: white;
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid #eee;
  }
  .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-tag {
    padding: 4px 12px;
    background: #f3f4f6;
    border-radius: 12px;
    font-size: 12px;
    color: #444;
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .btn-primary {
    padding: 10px 22px;
    background: #1a5c38;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
  }
  .btn-secondary {
    padding: 10px 22px;
    background: white;
    color: #1a5c38;
    border: 2px solid #1a5c38;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
    display: inline-block;
  }
  .btn-primary:hover { background: #145030; }
  .btn-secondary:hover { background: #f0fdf4; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
    font-size: 14px;
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>북한산 연구 논문 아카이브</h1>
    <p>Bukhansan National Park Research Archive</p>
  </div>
  <div class="header-stats">
    <div class="stat-item">
      <span class="stat-num" id="totalCount">-</span>
      <span class="stat-label">총 논문</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="categoryCount">-</span>
      <span class="stat-label">분야</span>
    </div>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="제목, 저자, 키워드 검색..." oninput="renderList()">
  <button onclick="renderList()">검색</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-cat="전체" onclick="setFilter('전체', this)">전체</button>
  <button class="filter-btn" data-cat="자원조사" onclick="setFilter('자원조사', this)">자원조사</button>
  <button class="filter-btn" data-cat="재난" onclick="setFilter('재난', this)">재난</button>
  <button class="filter-btn" data-cat="탐방" onclick="setFilter('탐방', this)">탐방</button>
  <button class="filter-btn" data-cat="생태" onclick="setFilter('생태', this)">생태</button>
  <button class="filter-btn" data-cat="역사문화" onclick="setFilter('역사문화', this)">역사문화</button>
</div>

<div id="statusBar" class="status-bar loading">
  <span class="dot"></span>
  <span id="statusMsg">논문 데이터 불러오는 중...</span>
</div>

<div class="main">
  <div class="paper-list">
    <div class="paper-count" id="paperCount">0건</div>
    <div id="paperListBody"></div>
  </div>
  <div class="paper-detail" id="paperDetail">
    <div class="detail-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span>왼쪽 목록에서 논문을 선택하세요</span>
    </div>
  </div>
</div>

<script>
let allPapers = [];
let currentFilter = '전체';
let selectedId = null;

const CAT_COLORS = {
  '자원조사': '#2563eb',
  '재난': '#dc2626',
  '탐방': '#d97706',
  '생태': '#16a34a',
  '역사문화': '#7c3aed'
};

async function loadPapers() {
  const statusBar = document.getElementById('statusBar');
  const statusMsg = document.getElementById('statusMsg');

  try {
    const res = await fetch('papers.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      throw new Error('논문 데이터 없음');
    }

    allPapers = data;

    statusBar.className = 'status-bar success';
    statusMsg.textContent = 'RISS 데이터 로드 완료 — ' + allPapers.length + '건';

    document.getElementById('totalCount').textContent = allPapers.length;
    const cats = new Set(allPapers.map(p => p.category));
    document.getElementById('categoryCount').textContent = cats.size;

    renderList();

  } catch (e) {
    statusBar.className = 'status-bar error';
    statusMsg.textContent = '데이터 로드 실패 — ' + e.message;
  }
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return allPapers.filter(p => {
    const catOk = currentFilter === '전체' || p.category === currentFilter;
    if (!catOk) return false;
    if (!q) return true;
    return (
      (p.title || '').toLowerCase().includes(q) ||
      (p.authors || '').toLowerCase().includes(q) ||
      (p.abstract || '').toLowerCase().includes(q) ||
      (p.journal || '').toLowerCase().includes(q)
    );
  });
}

function renderList() {
  const filtered = getFiltered();
  const body = document.getElementById('paperListBody');
  document.getElementById('paperCount').textContent = filtered.length + '건';

  if (filtered.length === 0) {
    body.innerHTML = '<div class="empty-state">검색 결과가 없습니다</div>';
    return;
  }

  body.innerHTML = filtered.map(p => `
    <div class="paper-item ${selectedId === p.id ? 'selected' : ''}" onclick="selectPaper('${p.id}')">
      <span class="paper-cat cat-${p.category}">${p.category}</span>
      <div class="paper-title">${p.title}</div>
      <div class="paper-meta">${p.authors || '저자 미상'} · ${p.year || '-'}</div>
    </div>
  `).join('');
}

function selectPaper(id) {
  selectedId = id;
  renderList();

  const p = allPapers.find(x => x.id === id);
  if (!p) return;

  const color = CAT_COLORS[p.category] || '#2563eb';
  const detail = document.getElementById('paperDetail');

  const fullTextBtn = p.full_text_url
    ? `<a class="btn-primary" href="${p.full_text_url}" target="_blank">원문 보기</a>`
    : '';

  const rissBtn = p.riss_url
    ? `<a class="btn-secondary" href="${p.riss_url}" target="_blank">RISS에서 보기</a>`
    : '';

  detail.innerHTML = `
    <span class="detail-cat" style="background:${color}">${p.category}</span>
    <div class="detail-title">${p.title}</div>

    <div class="detail-info-grid">
      <div class="detail-info-cell">
        <div class="label">저자</div>
        <div class="value">${p.authors || '미상'}</div>
      </div>
      <div class="detail-info-cell">
        <div class="label">발행연도</div>
        <div class="value">${p.year || '-'}</div>
      </div>
      <div class="detail-info-cell">
        <div class="label">학술지</div>
        <div class="value">${p.journal || '-'}</div>
      </div>
    </div>

    ${p.abstract ? `
    <div class="detail-section">
      <h3>논문 요약</h3>
      <div class="detail-abstract">${p.abstract}</div>
    </div>` : ''}

    <div class="detail-section">
      <div class="btn-row">
        ${fullTextBtn}
        ${rissBtn}
      </div>
    </div>
  `;
}

loadPapers();
</script>
</body>
</html>
