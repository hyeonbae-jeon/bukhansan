<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>북한산 논문 아카이브</title>
<style>
:root{
  --primary:#1d4ed8;--primary-dark:#1e40af;--primary-light:#eff6ff;
  --surface:#fff;--bg:#f1f5f9;--border:#e2e8f0;
  --fg:#0f172a;--fg2:#334155;--fg3:#64748b;--fg4:#94a3b8;
  --green:#065f46;--green-bg:#d1fae5;--green-border:#a7f3d0;
  --amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fde68a;
  --blue-bg:#dbeafe;--blue-fg:#1e40af;
  --radius:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--fg);font-size:14px;line-height:1.6}

/* ── Header ── */
.header{background:var(--primary);height:52px;display:flex;align-items:center;
  padding:0 20px;gap:16px;position:sticky;top:0;z-index:200;
  border-bottom:1px solid rgba(0,0,0,.15)}
.logo{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.3px;
  white-space:nowrap;text-decoration:none;flex-shrink:0}
.logo em{font-style:normal;opacity:.6;font-weight:400;font-size:12px;margin-left:6px}
.header-search{flex:1;max-width:520px;position:relative}
.header-search input{width:100%;padding:7px 12px 7px 34px;border:none;border-radius:var(--radius);
  font-size:13px;background:rgba(255,255,255,.18);color:#fff;outline:none;transition:background .2s}
.header-search input::placeholder{color:rgba(255,255,255,.55)}
.header-search input:focus{background:rgba(255,255,255,.28)}
.header-search .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.6);font-size:13px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.header-btn{color:rgba(255,255,255,.8);text-decoration:none;padding:5px 10px;
  border-radius:var(--radius);font-size:12px;border:1px solid rgba(255,255,255,.25);
  background:none;cursor:pointer;transition:background .15s;white-space:nowrap}
.header-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.header-btn.active-oa{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.5)}

/* ── Layout ── */
.layout{display:flex;max-width:1260px;margin:0 auto;padding:20px 16px;gap:20px;align-items:flex-start}

/* ── Sidebar ── */
.sidebar{width:228px;flex-shrink:0;position:sticky;top:68px;display:flex;flex-direction:column;gap:10px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 14px}
.panel-title{font-size:11px;font-weight:700;color:var(--fg3);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:10px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.stat-tile{border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:var(--primary)}
.stat-l{font-size:11px;color:var(--fg3);margin-top:1px}

.filter-item{display:flex;align-items:center;gap:8px;padding:4px 2px;cursor:pointer}
.filter-item label{font-size:13px;color:var(--fg2);cursor:pointer;flex:1}
.filter-count{font-size:11px;color:var(--fg4);background:#f8fafc;
  padding:1px 6px;border-radius:10px;border:1px solid var(--border)}
input[type=checkbox]{accent-color:var(--primary);cursor:pointer}

.year-inputs{display:flex;align-items:center;gap:6px;margin-top:8px}
.year-inputs input{width:72px;padding:5px 8px;border:1px solid var(--border);
  border-radius:var(--radius);font-size:13px;outline:none;color:var(--fg)}
.year-inputs input:focus{border-color:var(--primary)}
.year-inputs span{color:var(--fg4);font-size:12px}
.year-apply{width:100%;margin-top:8px;padding:6px;background:var(--primary-light);
  color:var(--primary);border:1px solid #bfdbfe;border-radius:var(--radius);
  font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.year-apply:hover{background:#dbeafe}

/* keyword cloud */
.kw-cloud{display:flex;flex-wrap:wrap;gap:5px}
.kw-tag{padding:3px 8px;background:#f1f5f9;color:var(--fg3);border-radius:4px;
  font-size:12px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.kw-tag:hover{background:var(--blue-bg);color:var(--blue-fg);border-color:#93c5fd}
.kw-tag.on{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ── Main ── */
.main{flex:1;min-width:0}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.result-count{font-size:13px;color:var(--fg3)}
.result-count strong{color:var(--fg);font-weight:600}
.spacer{flex:1}
.sort-wrap{display:flex;align-items:center;gap:6px}
.sort-wrap label{font-size:12px;color:var(--fg4)}
.sort-wrap select{padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);
  font-size:12px;outline:none;background:var(--surface);color:var(--fg);cursor:pointer}

.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 10px;
  background:var(--blue-bg);color:var(--blue-fg);border-radius:4px;font-size:12px;font-weight:500}
.chip button{background:none;border:none;color:var(--blue-fg);cursor:pointer;
  font-size:14px;line-height:1;padding:0 1px}

/* ── Paper cards ── */
.card-list{display:flex;flex-direction:column;gap:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 18px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#93c5fd}
.card.active{border-color:var(--primary);background:var(--primary-light)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:5px}
.card-title{font-size:14px;font-weight:600;color:var(--primary);line-height:1.4;flex:1}
.badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;align-items:flex-start}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;
  font-size:11px;font-weight:600;letter-spacing:.01em;border:1px solid transparent}
.badge-oa{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.badge-cat{background:var(--blue-bg);color:var(--blue-fg)}
.badge-naver{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.badge-openalex{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.card-meta{font-size:12px;color:var(--fg3);margin-bottom:6px;
  display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.card-meta .sep{color:var(--border)}
.card-abstract{font-size:13px;color:var(--fg2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.cite-count{font-size:12px;color:var(--fg3)}
.concepts{display:flex;flex-wrap:wrap;gap:4px}
.concept-tag{font-size:11px;color:var(--fg3);background:#f8fafc;
  padding:1px 7px;border-radius:3px;border:1px solid var(--border)}
.card-link{margin-left:auto;font-size:12px;color:var(--primary);text-decoration:none}
.card-link:hover{text-decoration:underline}

/* ── Pagination ── */
.pagination{display:flex;justify-content:center;gap:3px;margin-top:20px}
.pgbtn{padding:5px 11px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);font-size:13px;cursor:pointer;color:var(--fg2);transition:all .12s}
.pgbtn:hover{border-color:var(--primary);color:var(--primary)}
.pgbtn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.pgbtn:disabled{opacity:.35;cursor:default;pointer-events:none}

/* ── Detail panel ── */
.detail{position:fixed;right:0;top:52px;width:480px;height:calc(100vh - 52px);
  background:var(--surface);border-left:1px solid var(--border);
  overflow-y:auto;z-index:100;
  transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);
  padding:24px 26px}
.detail.open{transform:translateX(0)}
.detail-close{position:absolute;top:14px;right:14px;background:none;
  border:1px solid var(--border);border-radius:var(--radius);padding:3px 10px;
  cursor:pointer;font-size:12px;color:var(--fg3)}
.detail-close:hover{background:var(--bg)}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.detail-title{font-size:18px;font-weight:700;color:var(--fg);line-height:1.35;margin-bottom:16px}
.detail-row{margin-bottom:14px}
.detail-label{font-size:11px;font-weight:700;color:var(--fg4);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:3px}
.detail-val{font-size:13px;color:var(--fg2)}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.detail-abstract{font-size:13px;line-height:1.8;color:var(--fg2)}
.detail-concepts{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.detail-concept{font-size:12px;color:var(--fg3);background:#f1f5f9;
  padding:2px 8px;border-radius:4px;border:1px solid var(--border)}
.detail-actions{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap}
.btn-p{background:var(--primary);color:#fff;padding:8px 16px;border-radius:var(--radius);
  font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;
  transition:background .15s;display:inline-block}
.btn-p:hover{background:var(--primary-dark)}
.btn-s{background:#fff;color:var(--fg2);padding:8px 16px;border-radius:var(--radius);
  font-size:13px;font-weight:600;text-decoration:none;border:1px solid var(--border);
  cursor:pointer;transition:background .15s;display:inline-block}
.btn-s:hover{background:var(--bg)}

/* ── States ── */
.loading,.empty{text-align:center;padding:60px 20px;color:var(--fg4)}
.loading h3,.empty h3{font-size:16px;color:var(--fg3);margin-bottom:6px}
.spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;animation:sp .7s linear infinite;
  margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:860px){.sidebar{display:none}}
@media(max-width:600px){.detail{width:100%}}
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <a class="logo" href="#">북한산 아카이브<em>Bukhansan Academic Archive</em></a>
  <div class="header-search">
    <span class="ico">&#128269;</span>
    <input id="hSearch" type="text" placeholder="논문 제목, 초록 검색...">
  </div>
  <div class="header-right">
    <button class="header-btn" id="oaToggle">Open Access 전용</button>
    <button class="header-btn" onclick="exportCSV()">CSV 내보내기</button>
  </div>
</header>

<!-- ── Layout ── -->
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- Stats -->
    <div class="panel">
      <div class="panel-title">수집 현황</div>
      <div class="stat-row">
        <div class="stat-tile"><div class="stat-n" id="sTot">—</div><div class="stat-l">전체 논문</div></div>
        <div class="stat-tile"><div class="stat-n" id="sOA">—</div><div class="stat-l">Open Access</div></div>
      </div>
      <div class="stat-row" style="margin-top:0">
        <div class="stat-tile"><div class="stat-n" id="sYear">—</div><div class="stat-l">연도 범위</div></div>
        <div class="stat-tile"><div class="stat-n" id="sCite">—</div><div class="stat-l">최다 피인용</div></div>
      </div>
    </div>

    <!-- Category filter -->
    <div class="panel">
      <div class="panel-title">카테고리</div>
      <div id="catFilter"></div>
    </div>

    <!-- Source filter -->
    <div class="panel">
      <div class="panel-title">데이터 출처</div>
      <div id="srcFilter"></div>
    </div>

    <!-- Year range -->
    <div class="panel">
      <div class="panel-title">발행 연도</div>
      <div class="year-inputs">
        <input id="yFrom" type="number" placeholder="2000">
        <span>—</span>
        <input id="yTo" type="number" placeholder="2025">
      </div>
      <button class="year-apply" onclick="applyYear()">적용</button>
    </div>

    <!-- Keyword cloud -->
    <div class="panel">
      <div class="panel-title">주요 키워드</div>
      <div class="kw-cloud" id="kwCloud"></div>
    </div>

  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="toolbar">
      <div class="result-count" id="resultCount"></div>
      <div class="spacer"></div>
      <div class="sort-wrap">
        <label>정렬</label>
        <select id="sortSel" onchange="render()">
          <option value="year_desc">최신순</option>
          <option value="year_asc">오래된순</option>
          <option value="cite_desc">피인용 높은순</option>
          <option value="title_asc">제목 A→Z</option>
        </select>
      </div>
    </div>
    <div class="active-filters" id="activeFilters"></div>
    <div id="cardList"><div class="loading"><div class="spin"></div><h3>논문 불러오는 중...</h3></div></div>
    <div class="pagination" id="pagination"></div>
  </main>

</div>

<!-- ── Detail panel ── -->
<div class="detail" id="detail">
  <button class="detail-close" onclick="closeDetail()">닫기</button>
  <div id="detailContent"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let ALL = [], FILTERED = [], ACTIVE_PAPER = null;
let PAGE = 1; const PER = 15;
let filters = { cats: new Set(), srcs: new Set(), oa: false, q: "", yFrom: null, yTo: null, kw: null };

const CATEGORY_COLORS = {
  "생태":"#eff6ff:#1d4ed8", "재난":"#fef2f2:#dc2626",
  "탐방":"#f0fdf4:#16a34a", "자원조사":"#fefce8:#ca8a04",
  "역사문화":"#fdf4ff:#9333ea", "기타":"#f8fafc:#475569"
};

function badgeCat(cat){
  const [bg,fg] = (CATEGORY_COLORS[cat] || "#f8fafc:#475569").split(":");
  return `<span class="badge" style="background:${bg};color:${fg};border-color:transparent">${cat}</span>`;
}

// ── Fetch ──────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const r = await fetch("papers.json");
    if(!r.ok) throw new Error();
    ALL = await r.json();
  } catch {
    ALL = getSample();
  }
  initFilters();
  buildKeywordCloud();
  updateStats();
  applyFilters();
}

// ── Filters ────────────────────────────────────────────────────────────────
function initFilters(){
  const cats = [...new Set(ALL.map(p=>p.category||"기타"))].sort();
  const srcs = [...new Set(ALL.map(p=>p.source||"OpenAlex"))].sort();

  const catWrap = document.getElementById("catFilter");
  cats.forEach(c=>{
    const n = ALL.filter(p=>(p.category||"기타")===c).length;
    catWrap.innerHTML += `<label class="filter-item">
      <input type="checkbox" onchange="toggleCat('${c}',this.checked)" data-cat="${c}">
      <span style="flex:1;font-size:13px;color:var(--fg2)">${c}</span>
      <span class="filter-count">${n}</span></label>`;
  });

  const srcWrap = document.getElementById("srcFilter");
  srcs.forEach(s=>{
    const n = ALL.filter(p=>(p.source||"OpenAlex")===s).length;
    srcWrap.innerHTML += `<label class="filter-item">
      <input type="checkbox" onchange="toggleSrc('${s}',this.checked)" data-src="${s}">
      <span style="flex:1;font-size:13px;color:var(--fg2)">${s}</span>
      <span class="filter-count">${n}</span></label>`;
  });
}

function toggleCat(c,v){ v?filters.cats.add(c):filters.cats.delete(c); PAGE=1; applyFilters(); }
function toggleSrc(s,v){ v?filters.srcs.add(s):filters.srcs.delete(s); PAGE=1; applyFilters(); }
function applyYear(){
  filters.yFrom = parseInt(document.getElementById("yFrom").value)||null;
  filters.yTo   = parseInt(document.getElementById("yTo").value)||null;
  PAGE=1; applyFilters();
}

document.getElementById("hSearch").addEventListener("input", e=>{
  filters.q = e.target.value.trim().toLowerCase(); PAGE=1; applyFilters();
});

document.getElementById("oaToggle").addEventListener("click", ()=>{
  filters.oa = !filters.oa;
  document.getElementById("oaToggle").classList.toggle("active-oa", filters.oa);
  PAGE=1; applyFilters();
});

function applyFilters(){
  let d = [...ALL];
  if(filters.cats.size) d = d.filter(p=>filters.cats.has(p.category||"기타"));
  if(filters.srcs.size) d = d.filter(p=>filters.srcs.has(p.source||"OpenAlex"));
  if(filters.oa)        d = d.filter(p=>p.is_open_access);
  if(filters.yFrom)     d = d.filter(p=>parseInt(p.year||0)>=filters.yFrom);
  if(filters.yTo)       d = d.filter(p=>parseInt(p.year||0)<=filters.yTo);
  if(filters.q)         d = d.filter(p=>(p.title+" "+p.abstract).toLowerCase().includes(filters.q));
  if(filters.kw)        d = d.filter(p=>(p.title+" "+p.abstract+" "+(p.concepts||[]).join(" ")).toLowerCase().includes(filters.kw.toLowerCase()));
  FILTERED = d;
  sortData();
  renderActiveFilters();
  render();
}

function sortData(){
  const s = document.getElementById("sortSel").value;
  FILTERED.sort((a,b)=>{
    if(s==="year_desc") return parseInt(b.year||0)-parseInt(a.year||0);
    if(s==="year_asc")  return parseInt(a.year||0)-parseInt(b.year||0);
    if(s==="cite_desc") return (b.cited_by_count||0)-(a.cited_by_count||0);
    if(s==="title_asc") return (a.title||"").localeCompare(b.title||"");
    return 0;
  });
}

// ── Active filter chips ────────────────────────────────────────────────────
function renderActiveFilters(){
  const wrap = document.getElementById("activeFilters");
  let h = "";
  if(filters.kw) h += chip(`키워드: ${filters.kw}`, ()=>{ filters.kw=null; document.querySelectorAll(".kw-tag").forEach(t=>t.classList.remove("on")); PAGE=1; applyFilters(); });
  if(filters.oa) h += chip("Open Access 전용", ()=>{ filters.oa=false; document.getElementById("oaToggle").classList.remove("active-oa"); PAGE=1; applyFilters(); });
  filters.cats.forEach(c=> h += chip(`카테고리: ${c}`, ()=>{ filters.cats.delete(c); document.querySelector(`[data-cat="${c}"]`).checked=false; PAGE=1; applyFilters(); }));
  filters.srcs.forEach(s=> h += chip(`출처: ${s}`, ()=>{ filters.srcs.delete(s); document.querySelector(`[data-src="${s}"]`).checked=false; PAGE=1; applyFilters(); }));
  if(filters.yFrom||filters.yTo) h += chip(`연도: ${filters.yFrom||"~"}–${filters.yTo||"~"}`, ()=>{ filters.yFrom=filters.yTo=null; document.getElementById("yFrom").value=""; document.getElementById("yTo").value=""; PAGE=1; applyFilters(); });
  wrap.innerHTML = h;
}

function chip(txt, fn){
  const id = "chip_"+Math.random().toString(36).slice(2);
  setTimeout(()=>{ const el=document.getElementById(id); if(el) el.onclick=fn; },0);
  return `<div class="chip">${txt}<button id="${id}">&#x2715;</button></div>`;
}

// ── Render cards ───────────────────────────────────────────────────────────
function render(){
  sortData();
  const total = FILTERED.length;
  const pages = Math.ceil(total/PER);
  if(PAGE>pages) PAGE=1;
  const slice = FILTERED.slice((PAGE-1)*PER, PAGE*PER);

  document.getElementById("resultCount").innerHTML =
    `<strong>${total.toLocaleString()}</strong>건 (전체 ${ALL.length.toLocaleString()}건 중)`;

  const wrap = document.getElementById("cardList");
  if(!slice.length){
    wrap.innerHTML = `<div class="empty"><h3>검색 결과가 없습니다</h3><p>필터 조건을 바꿔보세요.</p></div>`;
    document.getElementById("pagination").innerHTML="";
    return;
  }

  wrap.innerHTML = slice.map(p=>cardHTML(p)).join("");
  wrap.querySelectorAll(".card").forEach(el=>{
    el.onclick = ()=>{ const id=el.dataset.id; openDetail(ALL.find(p=>p.id===id)); };
  });

  // Pagination
  const pg = document.getElementById("pagination");
  if(pages<=1){ pg.innerHTML=""; return; }
  let ph = "";
  ph += `<button class="pgbtn" ${PAGE===1?"disabled":""} onclick="goPage(${PAGE-1})">&#8592;</button>`;
  let lo=Math.max(1,PAGE-2), hi=Math.min(pages,PAGE+2);
  if(lo>1) ph+=`<button class="pgbtn" onclick="goPage(1)">1</button>${lo>2?'<span style="padding:0 4px;color:var(--fg4)">…</span>':""}`;
  for(let i=lo;i<=hi;i++) ph+=`<button class="pgbtn${i===PAGE?" on":""}" onclick="goPage(${i})">${i}</button>`;
  if(hi<pages) ph+=`${hi<pages-1?'<span style="padding:0 4px;color:var(--fg4)">…</span>':""}
    <button class="pgbtn" onclick="goPage(${pages})">${pages}</button>`;
  ph += `<button class="pgbtn" ${PAGE===pages?"disabled":""} onclick="goPage(${PAGE+1})">&#8594;</button>`;
  pg.innerHTML = ph;
}

function goPage(n){ PAGE=n; render(); window.scrollTo(0,0); }

function cardHTML(p){
  const oa   = p.is_open_access ? `<span class="badge badge-oa">OA</span>` : "";
  const src  = p.source==="Naver"
    ? `<span class="badge badge-naver">Naver</span>`
    : `<span class="badge badge-openalex">OpenAlex</span>`;
  const meta = [p.year, p.authors ? trunc(p.authors,50) : null, trunc(p.journal,40)]
    .filter(Boolean).join(" <span class='sep'>·</span> ");
  const abs  = p.abstract ? `<div class="card-abstract">${esc(p.abstract)}</div>` : "";
  const cite = p.cited_by_count
    ? `<span class="cite-count">피인용 ${p.cited_by_count.toLocaleString()}</span>` : "";
  const cons = (p.concepts||[]).slice(0,3).map(c=>`<span class="concept-tag">${esc(c)}</span>`).join("");

  return `<div class="card" data-id="${esc(p.id)}">
    <div class="card-top">
      <div class="card-title">${esc(p.title||"(제목 없음)")}</div>
      <div class="badges">${oa}${badgeCat(p.category||"기타")}${src}</div>
    </div>
    <div class="card-meta">${meta}</div>
    ${abs}
    <div class="card-footer">
      ${cite}<div class="concepts">${cons}</div>
      <a class="card-link" href="${esc(p.url||"#")}" target="_blank" onclick="e=>e.stopPropagation()">원문 보기 &#8599;</a>
    </div>
  </div>`;
}

// ── Detail panel ───────────────────────────────────────────────────────────
function openDetail(p){
  if(!p) return;
  ACTIVE_PAPER = p;
  document.querySelectorAll(".card").forEach(el=>el.classList.toggle("active", el.dataset.id===p.id));

  const oa   = p.is_open_access ? `<span class="badge badge-oa">Open Access</span>` : "";
  const src  = p.source==="Naver"
    ? `<span class="badge badge-naver">Naver Academic</span>`
    : `<span class="badge badge-openalex">OpenAlex</span>`;
  const oaLink = p.oa_url
    ? `<a class="btn-p" href="${esc(p.oa_url)}" target="_blank">무료 전문 보기</a>` : "";
  const doiLink= p.doi
    ? `<a class="btn-s" href="https://doi.org/${esc(p.doi)}" target="_blank">DOI 페이지</a>` : "";
  const urlLink= p.url && !p.doi
    ? `<a class="btn-s" href="${esc(p.url)}" target="_blank">원문 페이지</a>` : "";
  const copyBtn= `<button class="btn-s" onclick="copyRef()">인용 복사</button>`;
  const concepts= (p.concepts||[]).map(c=>`<span class="detail-concept">${esc(c)}</span>`).join("");
  const rows = [
    ["저자", p.authors],
    ["소속", p.institutions],
    ["학술지", p.journal],
    ["발행연도", p.year],
    ["피인용수", p.cited_by_count!=null ? p.cited_by_count.toLocaleString()+"회" : null],
    ["DOI", p.doi ? `<a href="https://doi.org/${esc(p.doi)}" target="_blank" style="color:var(--primary)">${esc(p.doi)}</a>` : null],
  ].filter(r=>r[1]).map(([l,v])=>`<div class="detail-row"><div class="detail-label">${l}</div><div class="detail-val">${v}</div></div>`).join("");

  document.getElementById("detailContent").innerHTML = `
    <div class="detail-badges">${badgeCat(p.category||"기타")}${oa}${src}</div>
    <div class="detail-title">${esc(p.title||"")}</div>
    ${rows}
    ${concepts ? `<div class="detail-row"><div class="detail-label">주요 개념</div><div class="detail-concepts">${concepts}</div></div>` : ""}
    <hr class="divider">
    <div class="detail-label">초록</div>
    <div class="detail-abstract" style="margin-top:6px">${p.abstract ? esc(p.abstract) : "초록 정보가 없습니다."}</div>
    <div class="detail-actions">${oaLink}${doiLink}${urlLink}${copyBtn}</div>`;

  document.getElementById("detail").classList.add("open");
}

function closeDetail(){
  document.getElementById("detail").classList.remove("open");
  document.querySelectorAll(".card").forEach(el=>el.classList.remove("active"));
  ACTIVE_PAPER = null;
}

function copyRef(){
  if(!ACTIVE_PAPER) return;
  const p = ACTIVE_PAPER;
  const ref = [p.authors, p.year?`(${p.year})`:"", p.title, p.journal, p.doi?`https://doi.org/${p.doi}`:""].filter(Boolean).join(". ");
  navigator.clipboard.writeText(ref).then(()=>alert("인용 정보가 클립보드에 복사되었습니다."));
}

// ── Stats ─────────────────────────────────────────────────────────────────
function updateStats(){
  const years = ALL.map(p=>parseInt(p.year||0)).filter(Boolean);
  const oa    = ALL.filter(p=>p.is_open_access).length;
  const cites = Math.max(...ALL.map(p=>p.cited_by_count||0));
  document.getElementById("sTot").textContent  = ALL.length;
  document.getElementById("sOA").textContent   = oa;
  document.getElementById("sYear").textContent = years.length ? `${Math.min(...years)}–${Math.max(...years)}` : "—";
  document.getElementById("sCite").textContent = cites > 0 ? cites : "—";
}

// ── Keyword cloud ──────────────────────────────────────────────────────────
function buildKeywordCloud(){
  const freq = {};
  ALL.forEach(p=>{
    (p.concepts||[]).forEach(c=>{ freq[c]=(freq[c]||0)+1; });
    (p.category ? [p.category] : []).forEach(c=>{ freq[c]=(freq[c]||0)+2; });
  });
  const top = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,25);
  const max = top[0]?.[1]||1;
  const cloud = document.getElementById("kwCloud");
  cloud.innerHTML = top.map(([k,n])=>{
    const size = 11 + Math.round((n/max)*5);
    return `<span class="kw-tag" style="font-size:${size}px" onclick="setKw('${k}')">${k}</span>`;
  }).join("");
}

function setKw(k){
  if(filters.kw===k){ filters.kw=null; document.querySelectorAll(".kw-tag").forEach(t=>t.classList.remove("on")); }
  else {
    filters.kw=k;
    document.querySelectorAll(".kw-tag").forEach(t=>t.classList.toggle("on", t.textContent===k));
  }
  PAGE=1; applyFilters();
}

// ── CSV export ─────────────────────────────────────────────────────────────
function exportCSV(){
  const cols = ["title","authors","year","journal","category","cited_by_count","is_open_access","source","doi","url"];
  const rows = [cols.join(","),
    ...FILTERED.map(p=>cols.map(c=>`"${String(p[c]||"").replace(/"/g,'""')}"`).join(","))];
  const blob = new Blob(["\uFEFF"+rows.join("\n")],{type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="bukhansan_papers.csv"; a.click();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function trunc(s,n){ return s && s.length>n ? s.slice(0,n)+"…" : (s||""); }
