<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북한산 논문 아카이브</title>
<style>
  :root{
    --bg:#f6f4ef;
    --ink:#1f2a1f;
    --line:#d9d3c4;
    --card:#ffffff;
    --cat-resource:#5b7a5b;
    --cat-disaster:#b4472e;
    --cat-tour:#3a6ea5;
    --cat-eco:#7a9a3e;
    --cat-culture:#9b6b34;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  header{
    padding:28px 24px 18px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0 0 4px;
    font-size:26px;
    letter-spacing:-0.5px;
  }
  header p{
    margin:0;
    color:#5a5a52;
    font-size:14px;
  }
  #layout{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:0;
  }
  @media (max-width: 900px){
    #layout{ grid-template-columns: 1fr; }
  }

  /* 좌측: 목록 */
  #panel{
    padding:20px 24px;
    border-right:1px solid var(--line);
  }
  #controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:14px;
  }
  .cat-btn{
    border:1px solid var(--line);
    background:var(--card);
    padding:6px 14px;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    color:var(--ink);
  }
  .cat-btn.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  #search{
    width:100%;
    padding:9px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:16px;
    font-size:14px;
  }
  #keywords{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:16px;
  }
  .kw-chip{
    border:1px solid var(--line);
    background:#f1f0e8;
    color:#5a5a52;
    padding:3px 10px;
    border-radius:999px;
    font-size:12px;
    cursor:pointer;
  }
  .kw-chip:hover{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  .kw-chip .kw-count{
    color:#a19b8a;
    margin-left:3px;
  }
  .kw-chip:hover .kw-count{
    color:#ddd;
  }
  #status{
    font-size:13px;
    color:#8a8578;
    margin-bottom:12px;
  }
  .paper{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:12px;
    cursor:pointer;
    transition:box-shadow .15s, border-color .15s;
  }
  .paper:hover{
    box-shadow:0 2px 10px rgba(0,0,0,.06);
  }
  .paper.selected{
    border-color:var(--ink);
  }
  .badge{
    display:inline-block;
    font-size:11px;
    color:#fff;
    padding:2px 9px;
    border-radius:999px;
    margin-bottom:8px;
  }
  .badge-자원조사{ background:var(--cat-resource); }
  .badge-재난{ background:var(--cat-disaster); }
  .badge-탐방{ background:var(--cat-tour); }
  .badge-생태{ background:var(--cat-eco); }
  .badge-역사문화{ background:var(--cat-culture); }
  .paper h3{
    margin:0 0 6px;
    font-size:16px;
    line-height:1.4;
    word-break:keep-all;
  }
  .meta{
    font-size:12.5px;
    color:#7a7a6f;
    margin-bottom:8px;
  }
  .meta span:not(:last-child)::after{
    content: " | ";
    color:#c9c2b0;
  }
  .summary{
    font-size:13.5px;
    line-height:1.6;
    color:#3a3a34;
    margin-bottom:8px;
  }
  .paper a{
    font-size:12.5px;
    color:var(--cat-tour);
    text-decoration:none;
  }
  #empty{
    padding:40px 10px;
    text-align:center;
    color:#8a8578;
    font-size:14px;
  }

  /* 우측: 상세 패널 */
  #detail{
    padding:20px 24px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  #dashboard{
    padding:4px 0 20px;
  }
  .dash-section{
    margin-bottom:30px;
  }
  .dash-section h3{
    font-size:14px;
    color:#5a5a52;
    margin:0 0 14px;
    font-weight:600;
  }
  .stat-big{
    font-size:42px;
    font-weight:700;
    line-height:1;
    color:var(--ink);
  }
  .stat-big .unit{
    font-size:14px;
    color:#8a8578;
    margin-left:6px;
    font-weight:400;
  }
  .cat-bar-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:9px;
    font-size:13px;
  }
  .cat-bar-row .cat-label{
    width:66px;
    flex-shrink:0;
    color:#5a5a52;
  }
  .cat-bar-track{
    flex:1;
    background:#eeece2;
    border-radius:4px;
    height:13px;
    overflow:hidden;
  }
  .cat-bar-fill{
    height:100%;
    border-radius:4px;
  }
  .cat-bar-count{
    width:38px;
    text-align:right;
    color:#8a8578;
    flex-shrink:0;
    font-size:12px;
  }
  #trend-chart-wrap{
    overflow-x:auto;
    padding-bottom:6px;
  }
  .trend-legend{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-top:10px;
    font-size:11.5px;
    color:#7a7a6f;
  }
  .trend-legend-item{
    display:flex;
    align-items:center;
    gap:4px;
  }
  .trend-legend-dot{
    width:9px;
    height:9px;
    border-radius:2px;
    display:inline-block;
  }
  #back-to-dash{
    display:inline-block;
    margin-bottom:16px;
    font-size:12.5px;
    color:#7a7a6f;
    cursor:pointer;
    text-decoration:underline;
  }
  #detail-content{
    display:none;
  }
  #detail-content h2{
    margin:6px 0 16px;
    font-size:20px;
    line-height:1.4;
  }
  .detail-row{
    margin-bottom:16px;
  }
  .detail-row .label{
    font-size:12px;
    color:#8a8578;
    margin-bottom:3px;
    font-weight:600;
  }
  .detail-row .value{
    font-size:14px;
    line-height:1.6;
    color:#2a2a24;
    white-space:pre-line;
  }
  #detail-link{
    display:inline-block;
    margin-top:4px;
    font-size:13px;
    color:var(--cat-tour);
    text-decoration:none;
  }
</style>
</head>
<body>

<header>
  <h1>북한산 논문 아카이브</h1>
  <p id="status">불러오는 중…</p>
</header>

<div id="layout">
  <div id="panel">
    <input id="search" type="text" placeholder="제목·키워드로 검색">
    <div id="controls">
      <button class="cat-btn active" data-cat="전체">전체</button>
      <button class="cat-btn" data-cat="자원조사">자원조사</button>
      <button class="cat-btn" data-cat="재난">재난</button>
      <button class="cat-btn" data-cat="탐방">탐방</button>
      <button class="cat-btn" data-cat="생태">생태</button>
      <button class="cat-btn" data-cat="역사문화">역사문화</button>
    </div>
    <div id="keywords"></div>
    <div id="list"></div>
    <div id="empty" style="display:none;">조건에 맞는 논문이 없습니다.</div>
  </div>

  <div id="detail">
    <div id="dashboard">
      <div class="dash-section">
        <h3>수집된 논문</h3>
        <div class="stat-big" id="stat-total">0<span class="unit">건</span></div>
      </div>
      <div class="dash-section">
        <h3>카테고리별 분포</h3>
        <div id="stat-categories"></div>
      </div>
      <div class="dash-section">
        <h3>연도별 연구 트렌드</h3>
        <div id="trend-chart-wrap"></div>
        <div class="trend-legend" id="trend-legend"></div>
      </div>
    </div>
    <div id="detail-content">
      <span id="back-to-dash">← 전체 통계로 돌아가기</span><br>
      <span id="detail-badge" class="badge"></span>
      <h2 id="detail-title"></h2>
      <div class="detail-row">
        <div class="label">저자</div>
        <div class="value" id="detail-authors"></div>
      </div>
      <div class="detail-row">
        <div class="label">소속</div>
        <div class="value" id="detail-institution"></div>
      </div>
      <div class="detail-row">
        <div class="label">학술지정보</div>
        <div class="value" id="detail-journal"></div>
      </div>
      <div class="detail-row">
        <div class="label">발행정보</div>
        <div class="value" id="detail-pubinfo"></div>
      </div>
      <div class="detail-row">
        <div class="label">초록</div>
        <div class="value" id="detail-abstract"></div>
      </div>
      <div class="detail-row">
        <a id="detail-link" href="#" target="_blank" rel="noopener">원문 페이지에서 보기 →</a>
      </div>
    </div>
  </div>
</div>

<script>
let ALL_PAPERS = [];
let currentCat = "전체";

function selectPaper(p, el){
  document.querySelectorAll('.paper').forEach(n => n.classList.remove('selected'));
  if(el) el.classList.add('selected');

  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';

  document.getElementById('detail-badge').textContent = p.category;
  document.getElementById('detail-badge').className = `badge badge-${p.category}`;
  document.getElementById('detail-title').textContent = p.title;
  document.getElementById('detail-authors').textContent = p.authors || "정보 없음";
  document.getElementById('detail-institution').textContent = p.institution || "정보 없음";
  document.getElementById('detail-journal').textContent = p.journal || "정보 없음";
  document.getElementById('detail-pubinfo').textContent = p.pub_info || (p.year !== '-' ? p.year : "정보 없음");
  document.getElementById('detail-abstract').textContent = p.abstract || p.description || "정보 없음";

  const link = document.getElementById('detail-link');
  if(p.url){
    link.href = p.url;
    link.style.display = "inline-block";
  } else {
    link.style.display = "none";
  }
}

function showDashboard(){
  document.querySelectorAll('.paper').forEach(n => n.classList.remove('selected'));
  document.getElementById('detail-content').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}
document.getElementById('back-to-dash').addEventListener('click', showDashboard);

function paperExcerpt(p){
  // 초록이 있으면 그중 한글 부분(첫 문단)만 발췌, 없으면 검색결과 스니펫으로 대체
  const source = p.abstract || p.description || "";
  if(!source) return "설명 정보가 없습니다.";
  const firstParagraph = source.split(/\n\s*\n/)[0].trim();
  let text = firstParagraph || source;
  // 앞부분에 영어(제목 번역 등)가 섞여 있으면, 한글이 처음 나오는 지점부터 시작
  const koreanStart = text.search(/[가-힣]/);
  if(koreanStart > 0){
    text = text.slice(koreanStart);
  }
  if(!text || text.length < 5){
    return "요약 정보가 아직 없습니다. (원문 링크에서 확인해 주세요)";
  }
  return text.length > 90 ? text.slice(0, 90) + "…" : text;
}

function renderList(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = ALL_PAPERS.filter(p => {
    const catOk = currentCat === "전체" || p.category === currentCat;
    const text = `${p.title} ${p.description} ${p.abstract}`.toLowerCase();
    const qOk = !q || text.includes(q);
    return catOk && qOk;
  });

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  list.innerHTML = "";

  if(filtered.length === 0){
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    filtered.forEach(p => {
      const metaParts = [];
      if(p.year && p.year !== '-') metaParts.push(`<span>${p.year}</span>`);
      if(p.authors) metaParts.push(`<span>${p.authors}</span>`);
      if(p.journal) metaParts.push(`<span>${p.journal}</span>`);

      const el = document.createElement('div');
      el.className = "paper";
      el.innerHTML = `
        <span class="badge badge-${p.category}">${p.category}</span>
        <h3>${p.title}</h3>
        <div class="meta">${metaParts.join('') || '<span>정보 없음</span>'}</div>
        <div class="summary">${paperExcerpt(p)}</div>
        ${p.url ? `<a href="${p.url}" target="_blank" rel="noopener">원문 보기 →</a>` : ""}
      `;
      el.addEventListener('click', () => selectPaper(p, el));
      const linkEl = el.querySelector('a');
      if(linkEl) linkEl.addEventListener('click', (e) => e.stopPropagation());
      list.appendChild(el);
    });
  }
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderList();
  });
});
document.getElementById('search').addEventListener('input', renderList);

function renderKeywords(keywords){
  const box = document.getElementById('keywords');
  box.innerHTML = "";
  if(!keywords || keywords.length === 0) return;
  keywords.forEach(k => {
    const chip = document.createElement('span');
    chip.className = "kw-chip";
    chip.innerHTML = `${k.word}<span class="kw-count">${k.count}</span>`;
    chip.addEventListener('click', () => {
      document.getElementById('search').value = k.word;
      renderList();
    });
    box.appendChild(chip);
  });
}

const CAT_ORDER = ["자원조사", "재난", "탐방", "생태", "역사문화"];
const CAT_COLORS = {
  "자원조사": "#5b7a5b",
  "재난": "#b4472e",
  "탐방": "#3a6ea5",
  "생태": "#7a9a3e",
  "역사문화": "#9b6b34",
};

function renderDashboard(){
  document.getElementById('stat-total').innerHTML = `${ALL_PAPERS.length}<span class="unit">건</span>`;

  // 카테고리별 분포
  const catCounts = {};
  CAT_ORDER.forEach(c => catCounts[c] = 0);
  ALL_PAPERS.forEach(p => { if(catCounts[p.category] !== undefined) catCounts[p.category]++; });
  const maxCat = Math.max(1, ...Object.values(catCounts));

  const catBox = document.getElementById('stat-categories');
  catBox.innerHTML = CAT_ORDER.map(c => `
    <div class="cat-bar-row">
      <span class="cat-label">${c}</span>
      <span class="cat-bar-track"><span class="cat-bar-fill" style="width:${(catCounts[c]/maxCat*100).toFixed(1)}%; background:${CAT_COLORS[c]};"></span></span>
      <span class="cat-bar-count">${catCounts[c]}</span>
    </div>
  `).join('');

  // 연도별 카테고리 트렌드
  const yearCatCounts = {};
  ALL_PAPERS.forEach(p => {
    const y = p.year;
    if(!y || y === '-' || !/^(19|20)\d{2}$/.test(y)) return;
    if(!yearCatCounts[y]) yearCatCounts[y] = {};
    yearCatCounts[y][p.category] = (yearCatCounts[y][p.category] || 0) + 1;
  });
  const years = Object.keys(yearCatCounts).sort();
  const wrap = document.getElementById('trend-chart-wrap');
  const legend = document.getElementById('trend-legend');

  if(years.length === 0){
    wrap.innerHTML = '<p style="color:#a19b8a;font-size:13px;">연도 정보가 있는 논문이 아직 없습니다.</p>';
    legend.innerHTML = '';
    return;
  }

  const barW = 22, gap = 12, chartH = 160, padTop = 10, padBottom = 34, padLeft = 8;
  const totals = years.map(y => CAT_ORDER.reduce((s, c) => s + (yearCatCounts[y][c] || 0), 0));
  const maxTotal = Math.max(1, ...totals);
  const svgW = padLeft + years.length * (barW + gap);
  const svgH = padTop + chartH + padBottom;

  let bars = '';
  years.forEach((y, i) => {
    let yOffset = 0;
    const x = padLeft + i * (barW + gap);
    CAT_ORDER.forEach(c => {
      const count = yearCatCounts[y][c] || 0;
      if(count === 0) return;
      const h = (count / maxTotal) * chartH;
      const yPos = padTop + chartH - yOffset - h;
      bars += `<rect x="${x}" y="${yPos}" width="${barW}" height="${h.toFixed(1)}" fill="${CAT_COLORS[c]}"><title>${y} · ${c} · ${count}건</title></rect>`;
      yOffset += h;
    });
    // 연도 라벨 (너무 많으면 홀수만 표시)
    if(years.length <= 20 || i % 2 === 0){
      bars += `<text x="${x + barW/2}" y="${padTop + chartH + 16}" font-size="10" fill="#8a8578" text-anchor="middle" transform="rotate(45 ${x + barW/2} ${padTop + chartH + 16})">${y}</text>`;
    }
    bars += `<text x="${x + barW/2}" y="${padTop + chartH - totals[i]/maxTotal*chartH - 4}" font-size="10" fill="#5a5a52" text-anchor="middle">${totals[i]}</text>`;
  });

  wrap.innerHTML = `<svg viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}" style="display:block;">${bars}</svg>`;
  legend.innerHTML = CAT_ORDER.map(c => `
    <span class="trend-legend-item"><span class="trend-legend-dot" style="background:${CAT_COLORS[c]};"></span>${c}</span>
  `).join('');
}

async function loadPapers(){
  const status = document.getElementById('status');
  try{
    const res = await fetch('papers.json', { cache: "no-store" });
    if(!res.ok) throw new Error("papers.json 없음");
    const data = await res.json();
    ALL_PAPERS = data.papers || [];
    status.textContent = `총 ${ALL_PAPERS.length}건 · 마지막 업데이트 ${data.updated || "-"}`;
    renderKeywords(data.keywords);
  }catch(e){
    status.textContent = "papers.json을 아직 불러오지 못했습니다. fetch_naver.py를 실행해서 papers.json을 만든 뒤 새로고침해 주세요.";
    ALL_PAPERS = [];
  }
  renderDashboard();
  renderList();
}

loadPapers();
</script>

</body>
</html>
