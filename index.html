<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북한산 실무 AI 지식 플랫폼</title>
<style>
  :root{
    --forest-900:#1c2b22;
    --forest-700:#2f4a38;
    --trail-50:#f4f1e6;
    --trail-100:#e9e3cf;
    --amber-500:#b6822c;
    --clay-500:#a8502f;
    --ink:#1c2b22;
    --paper:#fbf9f3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family: "Iowan Old Style", "Noto Serif KR", Georgia, serif;
  }
  header{
    background:var(--forest-900);
    color:var(--trail-50);
    padding:2.5rem 1.5rem 2rem;
    border-bottom:6px solid var(--amber-500);
  }
  header .eyebrow{
    font-family: "SFMono-Regular", Menlo, monospace;
    font-size:.75rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.75;
  }
  header h1{
    margin:.3rem 0 .5rem;
    font-size:clamp(1.6rem, 3vw, 2.4rem);
    font-weight:600;
  }
  header p{ margin:0; max-width:640px; opacity:.85; line-height:1.5; }

  .toolbar{
    max-width:1080px;
    margin:1.5rem auto 0;
    padding:0 1.5rem;
    display:flex;
    gap:.75rem;
    flex-wrap:wrap;
  }
  .toolbar input{
    flex:1 1 260px;
    padding:.7rem .9rem;
    border:1px solid var(--forest-700);
    background:var(--trail-50);
    font-family:inherit;
    font-size:1rem;
  }
  .stats{
    font-family:"SFMono-Regular", Menlo, monospace;
    font-size:.8rem;
    color:var(--forest-700);
    align-self:center;
  }

  .tags{
    max-width:1080px;
    margin:1rem auto 0;
    padding:0 1.5rem;
    display:flex;
    gap:.4rem;
    flex-wrap:wrap;
  }
  .tag-btn{
    font-family:"SFMono-Regular", Menlo, monospace;
    font-size:.72rem;
    padding:.3rem .6rem;
    background:var(--trail-100);
    border:1px solid var(--forest-700);
    color:var(--forest-700);
    cursor:pointer;
    border-radius:2px;
  }
  .tag-btn.active{ background:var(--forest-700); color:var(--trail-50); }

  main{ max-width:1080px; margin:2rem auto; padding:0 1.5rem; }

  .card{
    background:var(--trail-50);
    border:1px solid var(--trail-100);
    border-left:4px solid var(--forest-700);
    padding:1.3rem 1.5rem;
    margin-bottom:1rem;
  }
  .card h2{
    font-size:1.15rem;
    margin:0 0 .4rem;
    line-height:1.4;
  }
  .card .meta{
    font-family:"SFMono-Regular", Menlo, monospace;
    font-size:.72rem;
    color:var(--forest-700);
    margin-bottom:.7rem;
  }
  .card ul.summary{
    margin:0 0 .8rem;
    padding-left:1.1rem;
    line-height:1.55;
  }
  .scores{ display:flex; gap:1.2rem; margin-bottom:.7rem; }
  .score{
    font-family:"SFMono-Regular", Menlo, monospace;
    font-size:.75rem;
  }
  .score b{
    display:inline-block;
    background:var(--clay-500);
    color:var(--trail-50);
    padding:.1rem .4rem;
    margin-left:.3rem;
  }
  .card .tags-row{ display:flex; gap:.35rem; flex-wrap:wrap; }
  .chip{
    font-size:.68rem;
    font-family:"SFMono-Regular", Menlo, monospace;
    background:var(--trail-100);
    padding:.15rem .5rem;
    color:var(--forest-700);
  }
  .empty{
    text-align:center;
    padding:3rem 1rem;
    color:var(--forest-700);
    font-family:"SFMono-Regular", Menlo, monospace;
    font-size:.85rem;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Bukhansan Field Knowledge Base</div>
  <h1>북한산 실무 AI 지식 플랫폼</h1>
  <p>해외 학술 논문의 초록을 AI가 읽고, 국립공원 실무자가 논문을 직접 읽지 않아도
    바로 업무에 적용할 수 있는 형태로 분석한 결과를 모아둔 아카이브입니다.</p>
</header>

<div class="toolbar">
  <input id="search" type="text" placeholder="논문 제목, 요약, 태그로 검색…">
  <div class="stats" id="stats"></div>
</div>

<div class="tags" id="tagFilters"></div>

<main id="results">
  <div class="empty">불러오는 중…</div>
</main>

<script>
let papersIndex = [];
let activeTag = null;

async function init(){
  try{
    const idxRes = await fetch('index.json');
    const idx = await idxRes.json();
    papersIndex = idx.search_records || [];

    document.getElementById('stats').textContent =
      `분석 완료 ${idx.stats.analyzed_papers} / 전체 ${idx.stats.total_papers}건`
      + (idx.stats.avg_applicability_score ? ` · 평균 적용가능성 ${idx.stats.avg_applicability_score}` : '');

    const topTags = (idx.filters.tags || []).slice(0, 16);
    const tagBox = document.getElementById('tagFilters');
    topTags.forEach(([tag, count]) => {
      const btn = document.createElement('button');
      btn.className = 'tag-btn';
      btn.textContent = `${tag} (${count})`;
      btn.onclick = () => {
        activeTag = activeTag === tag ? null : tag;
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        if (activeTag) btn.classList.add('active');
        render();
      };
      tagBox.appendChild(btn);
    });

    render();
  }catch(e){
    document.getElementById('results').innerHTML =
      '<div class="empty">index.json을 불러오지 못했습니다. papers.json / index.json이 같은 폴더에 있는지 확인하세요.</div>';
    console.error(e);
  }
}

function render(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const results = document.getElementById('results');

  let filtered = papersIndex.filter(p => {
    if (activeTag && !(p.tags || []).includes(activeTag)) return false;
    if (!q) return true;
    const haystack = [
      p.title,
      ...(p.summary_3lines || []),
      ...(p.tags || []),
      ...(p.related_tasks || []),
    ].join(' ').toLowerCase();
    return haystack.includes(q);
  });

  if (filtered.length === 0){
    results.innerHTML = '<div class="empty">조건에 맞는 논문이 없습니다.</div>';
    return;
  }

  filtered.sort((a,b) => (b.applicability_score||0) - (a.applicability_score||0));

  results.innerHTML = filtered.map(p => `
    <div class="card">
      <h2>${escapeHtml(p.title || '')}</h2>
      <div class="meta">${p.journal ? escapeHtml(p.journal) + ' · ' : ''}${p.publication_year || ''}</div>
      <ul class="summary">
        ${(p.summary_3lines || []).map(s => `<li>${escapeHtml(s)}</li>`).join('')}
      </ul>
      <div class="scores">
        <span class="score">적용가능성<b>${p.applicability_score ?? '-'} / 5</b></span>
        <span class="score">실무활용도<b>${p.practical_utility_score ?? '-'} / 5</b></span>
      </div>
      <div class="tags-row">
        ${(p.tags || []).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}

document.getElementById('search').addEventListener('input', render);
init();
</script>

</body>
</html>
