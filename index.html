<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북한산 연구 논문 아카이브</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; }
  header { background: #2d6a4f; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 700; }
  header .stats { font-size: 13px; opacity: 0.85; }
  .search-bar { padding: 10px 16px; background: #fff; border-bottom: 1px solid #ddd; display: flex; gap: 8px; }
  .search-bar input { flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  .search-bar button { padding: 6px 14px; background: #2d6a4f; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .filter-bar { padding: 8px 16px; background: #fff; border-bottom: 1px solid #ddd; display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 4px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
  .filter-btn.active { background: #2d6a4f; color: #fff; border-color: #2d6a4f; }
  .status { padding: 6px 16px; font-size: 12px; color: #555; background: #f0faf4; border-bottom: 1px solid #ddd; }
  .status .dot { color: #2d6a4f; }
  .container { display: flex; height: calc(100vh - 130px); }
  .list { width: 300px; min-width: 260px; overflow-y: auto; border-right: 1px solid #ddd; background: #fff; }
  .paper-item { padding: 12px 14px; border-bottom: 1px solid #eee; cursor: pointer; }
  .paper-item:hover { background: #f0faf4; }
  .paper-item.active { background: #e8f5e9; border-left: 3px solid #2d6a4f; }
  .paper-item .tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #2d6a4f; color: #fff; display: inline-block; margin-bottom: 4px; }
  .paper-item .ptitle { font-size: 13px; font-weight: 600; line-height: 1.4; }
  .paper-item .pmeta { font-size: 11px; color: #888; margin-top: 3px; }
  .has-summary { border-left: 3px solid #40c9a2; }
  .detail { flex: 1; overflow-y: auto; padding: 24px; background: #fafafa; }
  .detail-empty { color: #aaa; text-align: center; margin-top: 80px; font-size: 15px; }
  .detail h2 { font-size: 20px; font-weight: 700; margin-bottom: 12px; line-height: 1.4; }
  .detail-meta { display: flex; gap: 16px; font-size: 13px; color: #555; margin-bottom: 20px; flex-wrap: wrap; }
  .detail-meta span { background: #eee; padding: 3px 8px; border-radius: 3px; }
  .section-title { font-size: 13px; font-weight: 700; color: #2d6a4f; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-box { background: #e8f5e9; border-left: 4px solid #2d6a4f; padding: 14px 16px; border-radius: 4px; font-size: 14px; line-height: 1.7; margin-bottom: 20px; }
  .abstract-box { background: #fff; border: 1px solid #ddd; padding: 14px 16px; border-radius: 4px; font-size: 13px; line-height: 1.7; color: #444; margin-bottom: 20px; }
  .no-abstract { color: #aaa; font-size: 13px; font-style: italic; }
  .riss-btn { display: inline-block; padding: 10px 20px; background: #2d6a4f; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; }
  .riss-btn:hover { background: #1b4332; }
  .no-summary-note { font-size: 12px; color: #999; margin-bottom: 20px; font-style: italic; }
</style>
</head>
<body>
<header>
  <div>
    <h1>북한산 연구 논문 아카이브</h1>
    <div style="font-size:11px;opacity:0.7">Bukhansan National Park Research Archive</div>
  </div>
  <div class="stats" id="stats">로딩 중...</div>
</header>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="제목, 저자, 키워드 검색...">
  <button onclick="doSearch()">검색</button>
</div>
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="setFilter('전체')">전체</button>
  <button class="filter-btn" onclick="setFilter('자원조사')">자원조사</button>
  <button class="filter-btn" onclick="setFilter('재난')">재난</button>
  <button class="filter-btn" onclick="setFilter('탐방')">탐방</button>
  <button class="filter-btn" onclick="setFilter('생태')">생태</button>
  <button class="filter-btn" onclick="setFilter('역사문화')">역사문화</button>
</div>
<div class="status" id="status">불러오는 중...</div>
<div class="container">
  <div class="list" id="paperList"></div>
  <div class="detail" id="detail"><div class="detail-empty">왼쪽 목록에서 논문을 선택하세요</div></div>
</div>
<script>
let allPapers = [];
let currentFilter = '전체';
let currentSearch = '';

fetch('papers.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    allPapers = data;
    const withSummary = data.filter(p => p.summary).length;
    document.getElementById('stats').textContent = `총 논문 ${data.length}건 | AI 요약 ${withSummary}건`;
    document.getElementById('status').innerHTML = `<span class="dot">●</span> RISS 데이터 로드 완료 — ${data.length}건 (AI 요약 ${withSummary}건)`;
    renderList();
  })
  .catch(e => {
    document.getElementById('status').textContent = '● 데이터 로드 실패: ' + e.message;
  });

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === f);
  });
  renderList();
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value.toLowerCase();
  renderList();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function renderList() {
  let list = allPapers.filter(p => {
    const matchCat = currentFilter === '전체' || p.category === currentFilter;
    const matchSearch = !currentSearch ||
      (p.title || '').toLowerCase().includes(currentSearch) ||
      (p.author || '').toLowerCase().includes(currentSearch) ||
      (p.abstract || '').toLowerCase().includes(currentSearch);
    return matchCat && matchSearch;
  });

  const el = document.getElementById('paperList');
  if (list.length === 0) {
    el.innerHTML = '<div style="padding:20px;color:#aaa;font-size:13px;">검색 결과가 없습니다.</div>';
    return;
  }

  el.innerHTML = list.map((p, i) => `
    <div class="paper-item ${p.summary ? 'has-summary' : ''}" onclick="showDetail(${allPapers.indexOf(p)})">
      <span class="tag">${p.category || '전체'}</span>
      ${p.summary ? '<span style="font-size:10px;color:#40c9a2;margin-left:4px;">AI요약</span>' : ''}
      <div class="ptitle">${p.title || '제목 없음'}</div>
      <div class="pmeta">${p.author || '저자 미상'} · ${p.year || '-'}</div>
    </div>
  `).join('');
}

function showDetail(idx) {
  const p = allPapers[idx];
  document.querySelectorAll('.paper-item').forEach((el, i) => {
    el.classList.toggle('active', allPapers.indexOf(allPapers.find((_, j) => j === idx)) === idx);
  });

  document.getElementById('detail').innerHTML = `
    <h2>${p.title || '제목 없음'}</h2>
    <div class="detail-meta">
      <span>저자: ${p.author || '미상'}</span>
      <span>발행: ${p.year || '-'}</span>
      <span>학술지: ${p.journal || '-'}</span>
      <span>${p.category || '-'}</span>
    </div>
    ${p.summary ? `
      <div class="section-title">AI 요약 (Gemini)</div>
      <div class="summary-box">${p.summary}</div>
    ` : `
      <div class="no-summary-note">이 논문은 초록 정보가 없어 AI 요약을 생성하지 못했습니다.</div>
    `}
    <div class="section-title">원문 초록</div>
    ${p.abstract
      ? `<div class="abstract-box">${p.abstract}</div>`
      : `<div class="no-abstract">초록 정보 없음</div>`}
    <a href="${p.url}" target="_blank" class="riss-btn">RISS에서 원문 보기</a>
  `;
}
</script>
</body>
</html>
