<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>북한산 연구 논문 아카이브</title>
  <style>
    :root {
      --primary: #2d6a4f;
      --primary-light: #52b788;
      --secondary: #40916c;
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --border: #d1d5db;
      --text: #111827;
      --text-muted: #6b7280;
      --cat-resource: #2563eb;
      --cat-disaster: #dc2626;
      --cat-tour: #d97706;
      --cat-ecology: #059669;
      --cat-history: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      background: var(--primary); color: #fff;
      padding: 12px 20px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
      border-bottom: 2px solid rgba(0,0,0,0.15);
    }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-sub   { font-size: 11px; opacity: 0.75; margin-top: 1px; }
    .header-stats { display: flex; gap: 24px; }
    .stat { text-align: right; }
    .stat-num { font-size: 22px; font-weight: 700; line-height: 1.1; }
    .stat-label { font-size: 10px; opacity: 0.75; }

    .body-wrap {
      display: grid; grid-template-columns: 320px 1fr;
      flex: 1; overflow: hidden;
    }

    /* ── 사이드바 ── */
    .sidebar {
      background: var(--card-bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-top {
      padding: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .search-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .search-input {
      flex: 1; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; outline: none;
    }
    .search-input:focus { border-color: var(--primary-light); }
    .btn {
      padding: 7px 13px; background: var(--primary); color: #fff;
      border: none; border-radius: 6px; font-size: 12px;
      font-weight: 600; cursor: pointer;
    }
    .btn:hover { background: var(--secondary); }
    .cat-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .cat-btn {
      padding: 4px 10px; border: 1px solid var(--border);
      border-radius: 4px; background: #fff; font-size: 11px;
      font-weight: 600; cursor: pointer; color: var(--text);
    }
    .cat-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .cat-btn[data-cat="자원조사"].active { background: var(--cat-resource); border-color: var(--cat-resource); }
    .cat-btn[data-cat="재난"].active     { background: var(--cat-disaster); border-color: var(--cat-disaster); }
    .cat-btn[data-cat="탐방"].active     { background: var(--cat-tour);     border-color: var(--cat-tour); }
    .cat-btn[data-cat="생태"].active     { background: var(--cat-ecology);  border-color: var(--cat-ecology); }
    .cat-btn[data-cat="역사문화"].active { background: var(--cat-history);  border-color: var(--cat-history); }

    .status-bar {
      padding: 5px 10px; border-radius: 6px; font-size: 11px;
      display: flex; align-items: center; gap: 6px;
    }
    .status-bar.ok     { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
    .status-bar.err    { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .status-bar.loading{ background: #fefce8; border: 1px solid #fde68a; color: #92400e; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: #059669; }
    .dot.red    { background: #dc2626; }
    .dot.yellow { background: #f59e0b; }

    .paper-list { flex: 1; overflow-y: auto; padding: 10px; }
    .paper-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 7px; padding: 12px 12px 10px;
      margin-bottom: 8px; cursor: pointer; transition: border-color 0.12s;
    }
    .paper-card:hover { border-color: var(--primary-light); }
    .paper-card.sel   { border-left: 3px solid var(--primary); border-color: var(--primary); }

    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 3px;
      font-size: 10px; font-weight: 700; color: #fff; margin-bottom: 5px;
    }
    .badge-자원조사 { background: var(--cat-resource); }
    .badge-재난     { background: var(--cat-disaster); }
    .badge-탐방     { background: var(--cat-tour); }
    .badge-생태     { background: var(--cat-ecology); }
    .badge-역사문화 { background: var(--cat-history); }

    .p-title   { font-size: 12px; font-weight: 600; line-height: 1.45; margin-bottom: 4px; }
    .p-meta    { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
    .p-summary {
      font-size: 11px; color: var(--text-muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }

    /* ── 상세 패널 ── */
    .detail-panel {
      background: #fff; overflow-y: auto; padding: 24px 28px; flex: 1;
    }
    .detail-placeholder {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 13px; gap: 8px;
    }
    .detail-placeholder-icon { font-size: 32px; opacity: 0.25; }
    .right-panel { display: flex; flex-direction: column; overflow: hidden; }

    .d-title { font-size: 17px; font-weight: 700; line-height: 1.45; margin: 8px 0 14px; }
    .d-meta-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 8px; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 7px; margin-bottom: 16px;
    }
    .d-meta-item label { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; }
    .d-meta-item span  { font-size: 12px; font-weight: 500; }
    .d-section-title {
      font-size: 12px; font-weight: 700; color: var(--primary);
      border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 10px;
    }
    .d-summary-text { font-size: 13px; line-height: 1.85; color: var(--text); margin-bottom: 16px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
    .chip-kw {
      padding: 3px 9px; background: #f3f4f6;
      border: 1px solid var(--border); border-radius: 4px; font-size: 11px;
    }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .btn-fulltext {
      display: inline-block; padding: 8px 18px;
      background: var(--primary); color: #fff; border: none;
      border-radius: 6px; font-size: 12px; font-weight: 600;
      text-decoration: none; cursor: pointer;
    }
    .btn-fulltext:hover { background: var(--secondary); }
    .btn-riss {
      display: inline-block; padding: 8px 18px;
      background: #fff; color: var(--primary);
      border: 1px solid var(--primary);
      border-radius: 6px; font-size: 12px; font-weight: 600;
      text-decoration: none; cursor: pointer;
    }
    .btn-riss:hover { background: #f0fdf4; }

    .updated-badge {
      font-size: 10px; color: var(--text-muted);
      margin-top: 4px; display: block;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="header-title">북한산 연구 논문 아카이브</div>
    <div class="header-sub">Bukhansan National Park Research Archive · RISS 연동</div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="cnt-total">—</div>
      <div class="stat-label">총 논문</div>
    </div>
    <div class="stat">
      <div class="stat-num">5</div>
      <div class="stat-label">분야</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="cnt-shown">—</div>
      <div class="stat-label">표시 중</div>
    </div>
  </div>
</header>

<div class="body-wrap">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-row">
        <input type="text" class="search-input" id="searchInput"
          placeholder="제목, 저자, 키워드 검색..."
          onkeydown="if(event.key==='Enter') applyFilter()">
        <button class="btn" onclick="applyFilter()">검색</button>
      </div>
      <div class="cat-tabs">
        <button class="cat-btn active" data-cat="전체"    onclick="setCat(this)">전체</button>
        <button class="cat-btn"        data-cat="자원조사" onclick="setCat(this)">자원조사</button>
        <button class="cat-btn"        data-cat="재난"    onclick="setCat(this)">재난</button>
        <button class="cat-btn"        data-cat="탐방"    onclick="setCat(this)">탐방</button>
        <button class="cat-btn"        data-cat="생태"    onclick="setCat(this)">생태</button>
        <button class="cat-btn"        data-cat="역사문화" onclick="setCat(this)">역사문화</button>
      </div>
      <div class="status-bar loading" id="statusBar" style="margin-top:10px;">
        <div class="dot yellow" id="statusDot"></div>
        <span id="statusMsg">논문 데이터 불러오는 중...</span>
      </div>
      <span class="updated-badge" id="updatedBadge"></span>
    </div>
    <div class="paper-list" id="paperList">
      <div class="empty-msg">불러오는 중...</div>
    </div>
  </aside>

  <div class="right-panel">
    <div class="detail-panel" id="detailPanel">
      <div class="detail-placeholder" id="detailPlaceholder">
        <div class="detail-placeholder-icon">&#128196;</div>
        <div>왼쪽 목록에서 논문을 선택하면 상세 내용이 표시됩니다</div>
      </div>
      <div id="detailContent" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
var allPapers  = [];
var filtered   = [];
var currentCat = '전체';
var selectedId = null;

/* ── papers.json 로드 ── */
function loadPapers() {
  fetch('./papers.json?_=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('papers.json 없음 (HTTP ' + r.status + ')');
      return r.json();
    })
    .then(function(data) {
      allPapers = data.papers || [];
      document.getElementById('cnt-total').textContent = data.total || allPapers.length;
      if (data.updated) {
        document.getElementById('updatedBadge').textContent = '최종 업데이트: ' + data.updated;
      }
      setStatus('ok', 'RISS 데이터 연결됨 — ' + allPapers.length + '건');
      applyFilter();
    })
    .catch(function(e) {
      setStatus('err', 'papers.json 없음 — GitHub Actions를 먼저 실행하세요');
      document.getElementById('paperList').innerHTML =
        '<div class="empty-msg" style="color:#b91c1c;">' +
        '<b>데이터 파일이 없습니다</b><br><br>' +
        'GitHub 저장소 → Actions 탭<br>' +
        '→ Fetch RISS Papers → Run workflow<br>' +
        '→ 1~2분 후 새로고침</div>';
    });
}

function setStatus(type, msg) {
  var bar = document.getElementById('statusBar');
  var dot = document.getElementById('statusDot');
  bar.className = 'status-bar ' + type;
  dot.className = 'dot ' + (type==='ok'?'green':type==='err'?'red':'yellow');
  document.getElementById('statusMsg').textContent = msg;
}

/* ── 필터 ── */
function setCat(btn) {
  currentCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = allPapers.filter(function(p) {
    var catOk  = currentCat === '전체' || p.category === currentCat;
    var srchOk = !q ||
      (p.title  || '').toLowerCase().includes(q) ||
      (p.author || '').toLowerCase().includes(q) ||
      (p.keywords || []).some(function(k){ return k.toLowerCase().includes(q); });
    return catOk && srchOk;
  });
  renderList();
}

/* ── 목록 렌더링 ── */
function renderList() {
  document.getElementById('cnt-shown').textContent = filtered.length;
  var list = document.getElementById('paperList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-msg">검색 결과가 없습니다</div>';
    return;
  }
  list.innerHTML = filtered.map(function(p) {
    var sel = selectedId === p.id ? ' sel' : '';
    return '<div class="paper-card' + sel + '" onclick="selectPaper(\'' + p.id + '\')">' +
      '<span class="badge badge-' + p.category + '">' + p.category + '</span>' +
      '<div class="p-title">' + esc(p.title) + '</div>' +
      '<div class="p-meta">' + esc(p.author) + ' · ' + esc(p.year) + ' · ' + esc(p.journal) + '</div>' +
      '<div class="p-summary">' + esc(p.summary) + '</div>' +
      '</div>';
  }).join('');
}

/* ── 상세 ── */
function selectPaper(id) {
  selectedId = id;
  var paper = allPapers.find(function(p){ return p.id === id; });
  if (!paper) return;

  document.getElementById('detailPlaceholder').style.display = 'none';
  var content = document.getElementById('detailContent');
  content.style.display = 'block';

  var kwHtml = (paper.keywords || []).map(function(k){
    return '<span class="chip-kw">' + esc(k) + '</span>';
  }).join('');

  var btnHtml = '';
  if (paper.fullTextUrl) {
    btnHtml += '<a href="' + paper.fullTextUrl + '" target="_blank" class="btn-fulltext">원문 보기</a>';
  }
  btnHtml += '<a href="' + (paper.rissUrl || 'https://www.riss.kr') + '" target="_blank" class="btn-riss">RISS에서 보기</a>';

  content.innerHTML =
    '<span class="badge badge-' + paper.category + '">' + paper.category + '</span>' +
    '<h2 class="d-title">' + esc(paper.title) + '</h2>' +
    '<div class="d-meta-grid">' +
      '<div class="d-meta-item"><label>저자</label><span>' + esc(paper.author) + '</span></div>' +
      '<div class="d-meta-item"><label>발행연도</label><span>' + esc(paper.year) + '</span></div>' +
      '<div class="d-meta-item"><label>학술지/출판사</label><span>' + esc(paper.journal) + '</span></div>' +
    '</div>' +
    '<div class="d-section-title">논문 요약</div>' +
    '<div class="d-summary-text">' + esc(paper.summary) + '</div>' +
    (kwHtml ? '<div class="d-section-title">키워드</div><div class="chip-row">' + kwHtml + '</div>' : '') +
    '<div class="btn-group">' + btnHtml + '</div>';

  /* 목록 활성 표시 갱신 */
  document.querySelectorAll('.paper-card').forEach(function(el, i) {
    el.classList.toggle('sel', filtered[i] && filtered[i].id === id);
  });
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

window.onload = loadPapers;
</script>
</body>
</html>
