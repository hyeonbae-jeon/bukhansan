<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북한산 연구 논문 아카이브</title>
<style>
:root {
    --primary: #2d6a4f;
    --primary-light: #52b788;
    --secondary: #40916c;
    --bg: #f4f6f8;
    --card: #ffffff;
    --border: #d1d5db;
    --text: #111827;
    --muted: #6b7280;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── 헤더 ── */
header {
    background: var(--primary); color: #fff;
    padding: 12px 20px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0;
    border-bottom: 2px solid rgba(0,0,0,.15);
}
.h-title { font-size: 18px; font-weight: 700; }
.h-sub   { font-size: 11px; opacity: .75; margin-top: 2px; }
.h-stats { display: flex; gap: 20px; }
.stat    { text-align: right; }
.stat-n  { font-size: 22px; font-weight: 700; line-height: 1; }
.stat-l  { font-size: 10px; opacity: .75; margin-top: 2px; }

/* ── 레이아웃 ── */
.wrap {
    display: grid; grid-template-columns: 340px 1fr;
    flex: 1; overflow: hidden;
}

/* ── 사이드바 ── */
aside {
    background: var(--card); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
}
.aside-top {
    padding: 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.search-row { display: flex; gap: 6px; margin-bottom: 8px; }
.s-input {
    flex: 1; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; outline: none; font-family: inherit;
}
.s-input:focus { border-color: var(--primary-light); }
.btn-search {
    padding: 8px 14px; background: var(--primary); color: #fff;
    border: none; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; white-space: nowrap;
}
.btn-search:hover { background: var(--secondary); }

.riss-ext-link {
    display: block; text-align: right; font-size: 11px; color: var(--primary);
    text-decoration: none; margin-bottom: 8px;
}
.riss-ext-link:hover { text-decoration: underline; }

.cats { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.cat-btn {
    padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 4px; background: #fff; font-size: 11px;
    font-weight: 600; cursor: pointer; color: var(--text); font-family: inherit;
    transition: all .1s;
}
.cat-btn.on-all  { background:#2d6a4f; border-color:#2d6a4f; color:#fff; }
.cat-btn.on-res  { background:#2563eb; border-color:#2563eb; color:#fff; }
.cat-btn.on-dis  { background:#dc2626; border-color:#dc2626; color:#fff; }
.cat-btn.on-tour { background:#d97706; border-color:#d97706; color:#fff; }
.cat-btn.on-eco  { background:#059669; border-color:#059669; color:#fff; }
.cat-btn.on-hist { background:#7c3aed; border-color:#7c3aed; color:#fff; }

.status {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 6px; font-size: 11px;
    background: #fefce8; border: 1px solid #fde68a; color: #92400e;
}
.status.ok  { background:#f0fdf4; border-color:#bbf7d0; color:#166534; }
.status.err { background:#fef2f2; border-color:#fecaca; color:#991b1b; }
.sdot { width:7px; height:7px; border-radius:50%; background:#f59e0b; flex-shrink:0; }
.sdot.ok  { background:#22c55e; }
.sdot.err { background:#ef4444; }

/* ── 논문 목록 ── */
.plist { flex:1; overflow-y:auto; padding:10px; }
.msg   { text-align:center; padding:30px; color:var(--muted); font-size:13px; }

.card {
    background:#fff; border:1px solid var(--border);
    border-radius:7px; padding:12px; margin-bottom:8px;
    cursor:pointer; transition:border-color .12s;
}
.card:hover { border-color:var(--primary-light); }
.card.sel   { border-left:3px solid var(--primary); border-color:var(--primary); }

.badge {
    display:inline-block; padding:2px 7px; border-radius:3px;
    font-size:10px; font-weight:700; color:#fff; margin-bottom:5px;
}
.b-자원조사 { background:#2563eb; }
.b-재난     { background:#dc2626; }
.b-탐방     { background:#d97706; }
.b-생태     { background:#059669; }
.b-역사문화 { background:#7c3aed; }

.sriss {
    display:inline-block; padding:1px 5px; border-radius:2px;
    font-size:9px; font-weight:600; margin-left:5px;
    background:#dcfce7; border:1px solid #bbf7d0; color:#166534;
    vertical-align:middle;
}
.c-title  { font-size:12px; font-weight:600; line-height:1.45; margin-bottom:4px; }
.c-meta   { font-size:10px; color:var(--muted); margin-bottom:4px; }
.c-abst   {
    font-size:11px; color:var(--muted); line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2;
    -webkit-box-orient:vertical; overflow:hidden;
}

/* ── 상세 패널 ── */
.detail {
    background:#fff; overflow-y:auto; padding:28px 32px;
}
.ph {
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:var(--muted); font-size:13px; gap:8px;
}
.ph-icon { font-size:32px; opacity:.2; }

.d-title { font-size:17px; font-weight:700; line-height:1.45; margin:10px 0 14px; }
.d-meta {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:8px; padding:12px; background:var(--bg);
    border:1px solid var(--border); border-radius:7px; margin-bottom:16px;
}
.d-meta label { font-size:10px; color:var(--muted); display:block; margin-bottom:3px; }
.d-meta span  { font-size:12px; font-weight:500; }
.d-sec {
    font-size:12px; font-weight:700; color:var(--primary);
    border-bottom:1px solid var(--border);
    padding-bottom:4px; margin:14px 0 10px;
}
.d-text { font-size:13px; line-height:1.85; color:var(--text); }
.chips  { display:flex; flex-wrap:wrap; gap:5px; margin:8px 0 14px; }
.chip-kw {
    padding:3px 10px; background:#f3f4f6;
    border:1px solid var(--border); border-radius:4px; font-size:11px;
}
.btn-riss {
    display:inline-block; padding:9px 22px; margin-top:8px;
    background:var(--primary); color:#fff; border-radius:6px;
    font-size:13px; font-weight:600; text-decoration:none;
}
.btn-riss:hover { background:var(--secondary); }

.src-badge {
    display:inline-block; padding:2px 8px; border-radius:3px;
    font-size:10px; font-weight:600; margin-left:8px; vertical-align:middle;
}
.src-riss   { background:#dcfce7; border:1px solid #bbf7d0; color:#166534; }
.src-sample { background:#fefce8; border:1px solid #fde68a; color:#92400e; }
</style>
</head>

/* ─── RISS API 호출 ─── */
var PROXIES = [
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?'
];

function withTimeout(promise, ms) {
  return new Promise(function(resolve, reject) {
    var t = setTimeout(function(){ reject(new Error('timeout')); }, ms);
    promise.then(function(v){ clearTimeout(t); resolve(v); },
                 function(e){ clearTimeout(t); reject(e); });
  });
}

async function callRISS(query) {
  var rissUrl = 'https://www.riss.kr/openapi/search' +
    '?apiKey=' + RISS_KEY +
    '&query=' + encodeURIComponent('북한산 ' + (query||'')) +
    '&start=1&display=50&format=json';

  for (var i = 0; i < PROXIES.length; i++) {
    try {
      var url = PROXIES[i] + encodeURIComponent(rissUrl);
      var res = await withTimeout(fetch(url), 9000);
      if (!res.ok) continue;
      var text = await res.text();
      // Remove BOM or leading whitespace
      text = text.trim().replace(/^﻿/, '');
      return JSON.parse(text);
    } catch(e) { continue; }
  }
  return null;
}

function parseRISS(data) {
  if (!data) return [];
  var items = null;
  // Handle various RISS response structures
  if (data.channel) {
    if (data.channel.item) items = data.channel.item;
    else if (data.channel.items) items = data.channel.items;
  }
  if (!items && data.items) items = data.items;
  if (!items && data.item) items = data.item;
  if (!items && Array.isArray(data)) items = data;
  if (!items) {
    // Try to find any array in the response
    var keys = Object.keys(data);
    for (var k of keys) {
      if (Array.isArray(data[k]) && data[k].length > 0) { items = data[k]; break; }
    }
  }
  if (!items) return [];
  if (!Array.isArray(items)) items = [items];

  return items.map(function(it, i) {
    var title   = (it.title||it.TITLE||it.artTitle||'').replace(/<[^>]*>/g,'').trim();
    var author  = (it.author||it.AUTHOR||it.creator||'').replace(/<[^>]*>/g,'').trim();
    var year    = String(it.pubYear||it.PUBYEAR||it.year||it.pubDt||'').slice(0,4);
    var journal = (it.journalName||it.JOURNALNAME||it.publisher||it.source||'').replace(/<[^>]*>/g,'').trim();
    var abst    = (it.abstract||it.ABSTRACT||it.description||'').replace(/<[^>]*>/g,'').trim();
    var link    = it.link||it.LINK||it.url||('https://www.riss.kr/search/Search.do?queryText='+encodeURIComponent(title));
    var kw      = (it.keyword||it.KEYWORD||it.subject||'').replace(/<[^>]*>/g,'');
    if (!title) return null;
    return {
      id:'r'+i, src:'r',
      title: title,
      author: author || '저자 미상',
      year: year,
      journal: journal,
      cat: autoCat(title+' '+abst+' '+kw),
      abst: abst || '초록 정보가 없습니다.',
      kws: kw ? kw.split(/[,;、]/).map(function(k){return k.trim();}).filter(Boolean) : [],
      link: link
    };
  }).filter(Boolean);
}

/* ─── 검색/필터 ─── */
function updateRissLink() {
  var q = curQ || '';
  var url = 'https://www.riss.kr/search/Search.do?queryText=' + encodeURIComponent('북한산 '+q);
  document.getElementById('rissLink').href = url;
}
function openRiss() {
  var url = 'https://www.riss.kr/search/Search.do?queryText=' + encodeURIComponent('북한산 '+(curQ||''));
  window.open(url, '_blank');
}

function doSearch() {
  curQ = document.getElementById('sInput').value.trim();
  updateRissLink();
  setStatus('', 'RISS 검색 중...');
  callRISS(curQ).then(function(data) {
    var rissItems = parseRISS(data);
    if (rissItems.length > 0) {
      var rTitles = rissItems.map(function(p){return p.title.slice(0,15);});
      var samp = SAMPLE.filter(function(s){
        return !rTitles.some(function(t){return s.title.includes(t);});
      });
      allPapers = rissItems.concat(samp);
      setStatus('ok','RISS 연동됨 — ' + rissItems.length + '건 검색됨');
      document.getElementById('cntRiss').textContent = rissItems.length;
    } else {
      allPapers = SAMPLE.slice();
      setStatus('err','RISS 연결 실패 — 기본 데이터 표시 중');
      document.getElementById('cntRiss').textContent = 0;
    }
    applyFilter();
  });
}

function setCat(cat, btn) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){b.className='cat-btn';});
  if (btn) btn.classList.add(CAT_CLS[cat]||'on-all');
  applyFilter();
}

function applyFilter() {
  filtered = allPapers.filter(function(p) {
    var catOk = curCat==='전체' || p.cat===curCat;
    var q = curQ.toLowerCase();
    var srchOk = !q ||
      p.title.toLowerCase().includes(q) ||
      p.author.toLowerCase().includes(q) ||
      p.kws.some(function(k){return k.toLowerCase().includes(q);});
    return catOk && srchOk;
  });
  renderList(filtered);
}

/* ─── 목록 렌더링 ─── */
function renderList(papers) {
  document.getElementById('cntTotal').textContent = papers.length;
  var el = document.getElementById('plist');
  if (!papers.length) {
    el.innerHTML = '<div class="msg">검색 결과가 없습니다</div>';
    return;
  }
  el.innerHTML = papers.map(function(p) {
    var rBadge = p.src==='r' ? '<span class="sriss">RISS</span>' : '';
    return '<div class="card'+(selId===p.id?' sel':'')+
      '" onclick="selPaper('+JSON.stringify(p.id)+')">' +
      '<span class="badge b-'+p.cat+'">'+p.cat+'</span>'+rBadge+
      '<div class="c-title">'+p.title+'</div>'+
      '<div class="c-meta">'+[p.author,p.year,p.journal].filter(Boolean).join(' · ')+'</div>'+
      '<div class="c-abst">'+(p.abst||'')+'</div>'+
      '</div>';
  }).join('');
}

/* ─── 상세 패널 ─── */
function selPaper(id) {
  selId = id;
  var p = allPapers.find(function(x){return x.id===id;});
  if (!p) return;

  document.getElementById('ph').style.display = 'none';
  var dc = document.getElementById('dc');
  dc.style.display = 'block';

  var srcBadge = p.src==='r'
    ? '<span class="src-badge src-riss">RISS 실시간</span>'
    : '<span class="src-badge src-sample">기본 데이터</span>';

  var kwHtml = p.kws && p.kws.length
    ? p.kws.map(function(k){return '<span class="chip-kw">'+k+'</span>';}).join('')
    : '<span style="color:var(--muted);font-size:12px;">키워드 없음</span>';

  dc.innerHTML =
    '<div><span class="badge b-'+p.cat+'">'+p.cat+'</span>'+srcBadge+'</div>'+
    '<h2 class="d-title">'+p.title+'</h2>'+
    '<div class="d-meta">'+
      '<div><label>저자</label><span>'+(p.author||'—')+'</span></div>'+
      '<div><label>발행연도</label><span>'+(p.year||'—')+'</span></div>'+
      '<div><label>학술지/출처</label><span>'+(p.journal||'—')+'</span></div>'+
    '</div>'+
    '<div class="d-sec">논문 초록</div>'+
    '<div class="d-text">'+(p.abst||'초록 정보가 없습니다.')+'</div>'+
    '<div class="d-sec">키워드</div>'+
    '<div class="chips">'+kwHtml+'</div>'+
    '<a href="'+p.link+'" target="_blank" class="btn-riss">RISS 원문 보기</a>';

  document.querySelectorAll('.card').forEach(function(el,i){
    el.classList.toggle('sel', filtered[i] && filtered[i].id===id);
  });
}

/* ─── 초기화 ─── */
window.onload = function() {
  updateRissLink();
  setStatus('', 'RISS 연결 시도 중...');
  callRISS('').then(function(data) {
    var rissItems = parseRISS(data);
    if (rissItems.length > 0) {
      var rTitles = rissItems.map(function(p){return p.title.slice(0,15);});
      var samp = SAMPLE.filter(function(s){
        return !rTitles.some(function(t){return s.title.includes(t);});
      });
      allPapers = rissItems.concat(samp);
      setStatus('ok','RISS 연동됨 — '+rissItems.length+'건 로드');
      document.getElementById('cntRiss').textContent = rissItems.length;
    } else {
      allPapers = SAMPLE.slice();
      setStatus('err','RISS 연결 실패 — 기본 데이터 표시 중');
    }
    applyFilter();
  });
};
</script>
</body>
</html>
