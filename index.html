<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>북한산 실무 AI 지식 플랫폼</title>
<style>
:root{
  --bg:#f8f9fb;--surface:#fff;--border:#e2e5ea;
  --text:#111827;--muted:#6b7280;--accent:#1d4ed8;
  --green:#15803d;--amber:#b45309;--red:#b91c1c;--gray:#6b7280;
  --tag-bg:#eff6ff;--tag-text:#1d4ed8;
  --score5:#15803d;--score4:#16a34a;--score3:#d97706;--score2:#9ca3af;--score1:#d1d5db;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

/* ── HEADER ── */
header{background:#0f172a;color:#f8fafc;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo span{color:#60a5fa;margin-left:6px;font-weight:400;font-size:12px}
.header-meta{font-size:12px;color:#94a3b8}

/* ── SEARCH BAR ── */
.search-wrap{background:#1e293b;padding:12px 24px;border-bottom:1px solid #334155}
.search-inner{max-width:900px;display:flex;gap:8px}
.search-inner input{flex:1;padding:8px 14px;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;font-size:14px;outline:none}
.search-inner input::placeholder{color:#64748b}
.search-inner input:focus{border-color:#3b82f6}
.search-inner button{padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}
.search-inner button:hover{background:#1d4ed8}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 104px)}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px}
.main{flex:1;overflow-y:auto;padding:16px}
.detail-panel{width:420px;min-width:420px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:none}
.detail-panel.open{display:block}

/* ── SIDEBAR ── */
.sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;margin-top:16px}
.sidebar h3:first-child{margin-top:0}
.filter-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:6px 10px;margin-bottom:2px;border-radius:5px;border:none;background:none;cursor:pointer;font-size:13px;text-align:left;color:var(--text)}
.filter-btn:hover{background:#f1f5f9}
.filter-btn.active{background:#eff6ff;color:var(--accent);font-weight:600}
.filter-btn .count{font-size:11px;color:var(--muted);background:#f1f5f9;padding:1px 6px;border-radius:10px}
.filter-btn.active .count{background:#dbeafe;color:#1d4ed8}

.score-filter label{display:flex;align-items:center;gap:6px;padding:4px 6px;cursor:pointer;border-radius:4px;font-size:13px}
.score-filter label:hover{background:#f8f9fb}
.score-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

.stats-card{background:#f8f9fb;border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px}
.stats-card .val{font-size:22px;font-weight:700;color:var(--accent)}
.stats-card .lbl{font-size:11px;color:var(--muted);margin-top:1px}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.result-count{font-size:13px;color:var(--muted)}
.sort-select{font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);cursor:pointer}

/* ── PAPER CARD ── */
.papers-grid{display:flex;flex-direction:column;gap:8px}
.paper-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
.paper-card:hover{border-color:#93c5fd}
.paper-card.selected{border-color:var(--accent);border-left:3px solid var(--accent)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-title{font-size:14px;font-weight:600;line-height:1.45;flex:1}
.card-scores{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.score-badge{display:flex;align-items:center;gap:4px;font-size:11px;white-space:nowrap}
.score-num{font-weight:700;font-size:13px}
.card-meta{margin-top:6px;font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px}
.card-summary{margin-top:8px;font-size:12px;color:#374151;line-height:1.5}
.card-summary li{margin-left:14px;margin-bottom:2px}
.card-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.tag{background:var(--tag-bg);color:var(--tag-text);font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid #dbeafe}
.oa-badge{background:#dcfce7;color:#15803d;font-size:11px;padding:1px 7px;border-radius:4px;font-weight:600}
.cat-badge{background:#f3f4f6;color:#374151;font-size:11px;padding:2px 8px;border-radius:4px}

/* ── DETAIL PANEL ── */
.detail-header{padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.detail-close{float:right;background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:0 4px}
.detail-title{font-size:15px;font-weight:700;line-height:1.4;margin-right:28px}
.detail-meta{margin-top:6px;font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px}
.detail-body{padding:16px}

.detail-section{margin-bottom:16px}
.detail-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #f1f5f9}
.detail-section p{font-size:13px;line-height:1.6;color:#374151}
.detail-section ul{padding-left:16px}
.detail-section ul li{font-size:13px;line-height:1.6;color:#374151;margin-bottom:3px}

.score-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.score-bar-label{font-size:12px;color:var(--muted);width:130px;flex-shrink:0}
.score-bar{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px}
.score-bar-val{font-size:13px;font-weight:700;width:18px;text-align:right}

.checklist li{list-style:none;padding-left:20px;position:relative;font-size:13px;line-height:1.6;color:#374151;margin-bottom:4px}
.checklist li::before{content:"☐";position:absolute;left:0;color:var(--muted)}

.law-item{font-size:12px;background:#fafafa;border:1px solid var(--border);border-radius:4px;padding:6px 10px;margin-bottom:4px;color:#374151}

.recommend-item{font-size:12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px;padding:6px 10px;margin-bottom:4px;color:#14532d}

.abstract-box{background:#f8f9fb;border:1px solid var(--border);border-radius:6px;padding:12px;font-size:12px;color:#4b5563;line-height:1.7;max-height:140px;overflow-y:auto}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.empty h3{font-size:16px;margin-bottom:6px;color:#374151}

/* ── SCORE COLORS ── */
.s5{color:var(--score5)}.s4{color:var(--score4)}.s3{color:#d97706}.s2{color:#9ca3af}.s1{color:#d1d5db}.s0{color:#e5e7eb}
.fill5{background:var(--score5)}.fill4{background:var(--score4)}.fill3{background:#d97706}.fill2{background:#9ca3af}.fill1{background:#d1d5db}

@media(max-width:900px){
  .detail-panel{position:fixed;right:0;top:104px;height:calc(100vh - 104px);z-index:50;width:100%;max-width:420px;box-shadow:-4px 0 20px rgba(0,0,0,.12)}
  .sidebar{width:200px;min-width:200px}
}
@media(max-width:640px){
  .sidebar{display:none}
  .detail-panel{width:100%;max-width:100%}
}
</style>
</head>
<body>

<header>
  <div class="logo">북한산 실무 AI 지식 플랫폼<span>Bukhansan Research Intelligence</span></div>
  <div class="header-meta" id="header-meta">로딩 중...</div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <input type="text" id="search-input" placeholder="논문 제목, 초록, 태그, 업무 분야 검색..." autocomplete="off">
    <button onclick="doSearch()">검색</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>통계</h3>
    <div class="stats-card"><div class="val" id="stat-total">-</div><div class="lbl">전체 논문</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <div class="stats-card"><div class="val" id="stat-analyzed" style="font-size:18px">-</div><div class="lbl">AI 분석 완료</div></div>
      <div class="stats-card"><div class="val" id="stat-priority" style="font-size:18px">-</div><div class="lbl">높은 적용성(4+)</div></div>
    </div>

    <h3>카테고리</h3>
    <div id="cat-filters"></div>

    <h3>북한산 적용 가능성</h3>
    <div class="score-filter" id="score-filters"></div>

    <h3>정렬</h3>
    <select class="sort-select" id="sort-select" onchange="renderList()" style="width:100%;margin-bottom:4px">
      <option value="bk_score">북한산 적용 가능성 순</option>
      <option value="util_score">실무 활용도 순</option>
      <option value="citations">피인용수 순</option>
      <option value="year_desc">최신순</option>
      <option value="year_asc">오래된순</option>
    </select>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="toolbar">
      <div class="result-count" id="result-count">논문 불러오는 중...</div>
    </div>
    <div class="papers-grid" id="papers-grid"></div>
    <div id="empty-state" class="empty" style="display:none">
      <h3>검색 결과 없음</h3>
      <p>다른 키워드나 필터를 시도해 보세요.</p>
    </div>
  </main>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-meta" id="detail-meta"></div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
let allPapers = [];
let filteredPapers = [];
let activeCategory = null;
let activeScores = new Set([1,2,3,4,5]);
let searchQuery = '';
let selectedId = null;

const SCORE_LABELS = {5:'매우 높음',4:'높음',3:'보통',2:'낮음',1:'매우 낮음',0:'미분석'};
const SCORE_COLOR  = {5:'s5',4:'s4',3:'s3',2:'s2',1:'s1',0:'s0'};

fetch('papers.json')
  .then(r => r.json())
  .then(data => {
    allPapers = data.papers || [];
    const stats = data.stats || {};
    document.getElementById('stat-total').textContent    = stats.total || allPapers.length;
    document.getElementById('stat-analyzed').textContent = stats.analyzed || 0;
    document.getElementById('stat-priority').textContent = stats.high_priority || 0;
    const upd = data.updated_at ? new Date(data.updated_at).toLocaleDateString('ko-KR') : '';
    document.getElementById('header-meta').textContent = upd ? `최종 업데이트 ${upd}` : '';
    buildCategoryFilters(stats.category_dist || {});
    buildScoreFilters();
    renderList();
  })
  .catch(err => {
    document.getElementById('papers-grid').innerHTML = '<div class="empty"><h3>papers.json을 불러올 수 없습니다</h3><p>GitHub Actions를 실행하거나 로컬 서버에서 확인하세요.</p></div>';
    console.error(err);
  });

function buildCategoryFilters(dist) {
  const el = document.getElementById('cat-filters');
  el.innerHTML = `<button class="filter-btn active" onclick="setCategory(null,this)">전체<span class="count">${allPapers.length}</span></button>`;
  Object.entries(dist).forEach(([cat, cnt]) => {
    el.innerHTML += `<button class="filter-btn" onclick="setCategory('${cat}',this)">${cat}<span class="count">${cnt}</span></button>`;
  });
}

function buildScoreFilters() {
  const el = document.getElementById('score-filters');
  const colors = {5:'#15803d',4:'#16a34a',3:'#d97706',2:'#9ca3af',1:'#d1d5db'};
  [5,4,3,2,1].forEach(s => {
    el.innerHTML += `<label>
      <input type="checkbox" checked onchange="toggleScore(${s})">
      <span class="score-dot" style="background:${colors[s]}"></span>
      ${s}점 — ${SCORE_LABELS[s]}
    </label>`;
  });
}

function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('#cat-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function toggleScore(s) {
  if (activeScores.has(s)) activeScores.delete(s); else activeScores.add(s);
  renderList();
}

function doSearch() {
  searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
  renderList();
}
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function applyFilters() {
  return allPapers.filter(p => {
    if (activeCategory && p.category !== activeCategory) return false;
    const bk = (p.ai_analysis || {}).bukhansan_applicability_score || 0;
    if (!activeScores.has(bk) && bk !== 0) return false;
    if (searchQuery) {
      const hay = (p.search_text || (p.title+' '+p.abstract+' '+((p.ai_analysis||{}).tags||[]).join(' ')).toLowerCase());
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });
}

function sortPapers(papers) {
  const sort = document.getElementById('sort-select').value;
  return [...papers].sort((a, b) => {
    const ai_a = a.ai_analysis || {}, ai_b = b.ai_analysis || {};
    if (sort === 'bk_score')   return (ai_b.bukhansan_applicability_score||0) - (ai_a.bukhansan_applicability_score||0);
    if (sort === 'util_score') return (ai_b.practical_utility_score||0) - (ai_a.practical_utility_score||0);
    if (sort === 'citations')  return (b.citations||0) - (a.citations||0);
    if (sort === 'year_desc')  return (b.year||0) - (a.year||0);
    if (sort === 'year_asc')   return (a.year||0) - (b.year||0);
    return 0;
  });
}

function renderList() {
  filteredPapers = sortPapers(applyFilters());
  const grid = document.getElementById('papers-grid');
  const empty = document.getElementById('empty-state');
  document.getElementById('result-count').textContent = `${filteredPapers.length}건`;

  if (!filteredPapers.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = filteredPapers.map(p => {
    const ai = p.ai_analysis || {};
    const bk = ai.bukhansan_applicability_score || 0;
    const ut = ai.practical_utility_score || 0;
    const tags = (ai.tags || []).slice(0, 5).map(t => `<span class="tag">${t}</span>`).join('');
    const summary = (ai.summary_3lines || []).slice(0,2).map(s => `<li>${s}</li>`).join('');
    const authorStr = (p.authors || []).slice(0,2).join(', ') + ((p.authors||[]).length > 2 ? ' 외' : '');
    const oaBadge = p.is_oa ? '<span class="oa-badge">OA</span>' : '';
    const selected = p.id === selectedId ? 'selected' : '';
    return `<div class="paper-card ${selected}" onclick="openDetail('${p.id}')">
      <div class="card-top">
        <div class="card-title">${p.title}</div>
        <div class="card-scores">
          <div class="score-badge"><span class="score-num ${SCORE_COLOR[bk]}">${bk||'-'}</span><span style="color:var(--muted);font-size:10px">/5 적용</span></div>
          <div class="score-badge"><span class="score-num ${SCORE_COLOR[ut]}">${ut||'-'}</span><span style="color:var(--muted);font-size:10px">/5 활용</span></div>
        </div>
      </div>
      <div class="card-meta">
        <span>${p.year||''}</span>
        ${authorStr ? `<span>${authorStr}</span>` : ''}
        ${p.journal ? `<span>${p.journal}</span>` : ''}
        ${p.citations ? `<span>피인용 ${p.citations}</span>` : ''}
        <span class="cat-badge">${p.category||''}</span>
        ${oaBadge}
      </div>
      ${summary ? `<ul class="card-summary">${summary}</ul>` : ''}
      ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    </div>`;
  }).join('');
}

function openDetail(id) {
  selectedId = id;
  document.querySelectorAll('.paper-card').forEach(el => el.classList.remove('selected'));
  event && event.currentTarget && event.currentTarget.classList.add('selected');

  const p = allPapers.find(x => x.id === id);
  if (!p) return;
  const ai = p.ai_analysis || {};
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');

  document.getElementById('detail-title').textContent = p.title;
  const authorStr = (p.authors || []).join(', ');
  const oaBadge = p.is_oa ? '<span class="oa-badge">OA</span>' : '';
  document.getElementById('detail-meta').innerHTML = `
    <span>${p.year||''}</span>${authorStr ? `<span>${authorStr}</span>` : ''}
    ${p.journal ? `<span>${p.journal}</span>` : ''}
    ${p.citations ? `<span>피인용 ${p.citations}</span>` : ''}
    <span class="cat-badge">${p.category||''}</span>${oaBadge}
    ${p.url ? `<a href="${p.url}" target="_blank" style="color:var(--accent);font-size:12px">원문 보기 →</a>` : ''}
  `;

  const bk = ai.bukhansan_applicability_score || 0;
  const ut = ai.practical_utility_score || 0;

  const listHtml = (arr, cls='') => (arr||[]).length
    ? `<ul class="${cls}">${(arr||[]).map(i=>`<li>${i}</li>`).join('')}</ul>`
    : '<p style="color:var(--muted);font-size:12px">정보 없음</p>';

  const tagHtml = (arr) => (arr||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  const lawHtml = (arr) => (arr||[]).map(l=>`<div class="law-item">${l}</div>`).join('') || '<p style="color:var(--muted);font-size:12px">정보 없음</p>';
  const recHtml = (arr) => (arr||[]).map(r=>`<div class="recommend-item">${r}</div>`).join('') || '<p style="color:var(--muted);font-size:12px">정보 없음</p>';

  document.getElementById('detail-body').innerHTML = `
    <!-- 점수 -->
    <div class="detail-section">
      <h4>실무 적용 점수</h4>
      <div class="score-bar-wrap">
        <div class="score-bar-label">북한산 적용 가능성</div>
        <div class="score-bar"><div class="score-bar-fill fill${bk}" style="width:${bk*20}%"></div></div>
        <div class="score-bar-val ${SCORE_COLOR[bk]}">${bk||'-'}</div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar-label">실무 활용도</div>
        <div class="score-bar"><div class="score-bar-fill fill${ut}" style="width:${ut*20}%"></div></div>
        <div class="score-bar-val ${SCORE_COLOR[ut]}">${ut||'-'}</div>
      </div>
      ${ai.applicability_reason ? `<p style="margin-top:8px;font-size:12px;color:#374151;background:#f8f9fb;padding:8px;border-radius:5px;border-left:3px solid #${bk>=4?'15803d':'d97706'}">${ai.applicability_reason}</p>` : ''}
    </div>

    <!-- 3줄 요약 -->
    <div class="detail-section">
      <h4>핵심 요약 (3줄)</h4>
      ${listHtml(ai.summary_3lines)}
    </div>

    <!-- 연구목적 -->
    <div class="detail-section">
      <h4>연구 목적</h4>
      <p>${ai.research_purpose||'정보 없음'}</p>
    </div>

    <!-- 핵심결과 -->
    <div class="detail-section">
      <h4>핵심 결과</h4>
      ${listHtml(ai.key_findings)}
    </div>

    <!-- 실무 적용 방안 -->
    <div class="detail-section">
      <h4>실무 적용 방안</h4>
      ${listHtml(ai.practical_applications)}
    </div>

    <!-- 관련 업무 -->
    <div class="detail-section">
      <h4>관련 업무</h4>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${(ai.related_tasks||[]).map(t=>`<span class="tag" style="background:#f0fdf4;color:#15803d;border-color:#bbf7d0">${t}</span>`).join('')||'<p style="color:var(--muted);font-size:12px">정보 없음</p>'}</div>
    </div>

    <!-- 현장 체크리스트 -->
    <div class="detail-section">
      <h4>현장 점검 체크리스트</h4>
      ${listHtml(ai.field_checklist,'checklist')}
    </div>

    <!-- 관련 법령 -->
    <div class="detail-section">
      <h4>관련 법령</h4>
      ${lawHtml(ai.related_laws)}
    </div>

    <!-- 주의사항 -->
    <div class="detail-section">
      <h4>적용 시 주의사항</h4>
      ${listHtml(ai.cautions)}
    </div>

    <!-- 태그 -->
    <div class="detail-section">
      <h4>관련 태그</h4>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${tagHtml(ai.tags)||'<p style="color:var(--muted);font-size:12px">없음</p>'}</div>
    </div>

    <!-- 추천 논문 -->
    <div class="detail-section">
      <h4>AI 추천 논문 주제</h4>
      ${recHtml(ai.recommended_papers)}
    </div>

    <!-- 후속 연구 -->
    <div class="detail-section">
      <h4>후속 연구 필요 내용</h4>
      ${listHtml(ai.future_research)}
    </div>

    <!-- 초록 -->
    ${p.abstract ? `<div class="detail-section"><h4>원문 초록</h4><div class="abstract-box">${p.abstract}</div></div>` : ''}
  `;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedId = null;
  document.querySelectorAll('.paper-card').forEach(el => el.classList.remove('selected'));
}
</script>
</body>
</html>
