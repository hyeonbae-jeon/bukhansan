<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>북한산 학술 논문 아카이브</title>
    <style>
        :root {
            --primary: #03c75a; /* 네이버 테마 감성 반영 */
            --bg-dark: #1e293b;
            --text-main: #334155;
        }
        body {
            font-family: 'Malgun Gothic', dotum, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            color: var(--text-main);
        }
        header {
            background-color: var(--bg-dark);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        .filter-btn {
            padding: 10px 20px;
            border: none;
            background-color: #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background-color: var(--primary);
            color: white;
        }
        .status-bar {
            margin-bottom: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        #paper-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .paper-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border-left: 5px solid #cbd5e1;
        }
        .paper-card.resource { border-left-color: #3b82f6; }
        .paper-card.disaster { border-left-color: #ef4444; }
        .paper-card.tour { border-left-color: #10b981; }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .badge.resource { background-color: #3b82f6; }
        .badge.disaster { background-color: #ef4444; }
        .badge.tour { background-color: #10b981; }

        .title {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #0f172a;
        }
        .author {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 15px;
        }
        .ai-box {
            background-color: #f0fdf4;
            border: 1px dashed #bbf7d0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .ai-title {
            font-size: 12px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 4px;
        }
        .ai-text {
            font-size: 14px;
            line-height: 1.5;
            color: #166534;
        }
        .link-btn {
            display: inline-block;
            font-size: 13px;
            color: white;
            background-color: var(--bg-dark);
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .link-btn:hover {
            opacity: 0.9;
        }
        .no-data {
            text-align: center;
            padding: 5px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<header>
    <h1>북한산 학술 정보 AI 아카이브</h1>
    <p>네이버 전문자료 자동 연동 및 Gemini AI 초록 핵심 요약 제공</p>
</header>

<div class="container">
    <div class="controls">
        <input type="text" id="search-input" class="search-box" placeholder="논문 제목 또는 요약 키워드 검색..." oninput="filterData()">
        <button class="filter-btn active" onclick="changeCategory('all', this)">전체보기</button>
        <button class="filter-btn" onclick="changeCategory('resource', this)">자원조사</button>
        <button class="filter-btn" onclick="changeCategory('disaster', this)">재난방재</button>
        <button class="filter-btn" onclick="changeCategory('tour', this)">탐방이용</button>
    </div>

    <div class="status-bar">
        검색된 논문: <span id="total-count" style="color:var(--primary)">0</span>건
    </div>

    <div id="paper-list">
        <div class="no-data">논문 데이터를 불러오는 중입니다...</div>
    </div>
</div>

<script>
    let allPapers = [];
    let currentCategory = 'all';

    // 사이트 켜지자마자 파이썬 로봇이 생성해둔 papers.json 동적 로드
    window.onload = function() {
        fetch('papers.json')
            .then(res => res.json())
            .then(data => {
                allPapers = data;
                renderPapers();
            })
            .catch(err => {
                document.getElementById('paper-list').innerHTML = 
                    `<div class="no-data">수집된 논문 데이터 파일(papers.json)이 없거나 아직 첫 자동 수집이 시작되지 않았습니다. GitHub의 Actions 탭에서 로봇을 강제 가동해보세요!</div>`;
            });
    };

    function changeCategory(cat, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = cat;
        renderPapers();
    }

    function filterData() {
        renderPapers();
    }

    function renderPapers() {
        const listContainer = document.getElementById('paper-list');
        const keyword = document.getElementById('search-input').value.toLowerCase();
        listContainer.innerHTML = '';
        
        let filtered = allPapers.filter(paper => {
            const matchesCat = (currentCategory === 'all' || paper.category === currentCategory);
            const matchesKey = (paper.title.toLowerCase().includes(keyword) || paper.summary.toLowerCase().includes(keyword));
            return matchesCat && matchesKey;
        });

        document.getElementById('total-count').innerText = filtered.length;

        if(filtered.length === 0) {
            listContainer.innerHTML = `<div class="no-data">조회된 논문 내역이 없습니다.</div>`;
            return;
        }

        filtered.forEach(paper => {
            const card = document.createElement('div');
            card.className = `paper-card ${paper.category}`;

            let catLabel = paper.category === 'resource' ? '자원조사' : paper.category === 'disaster' ? '재난방재' : '탐방이용';
            
            card.innerHTML = `
                <span class="badge ${paper.category}">${catLabel}</span>
                <h3 class="title">${paper.title}</h3>
                <div class="author">${paper.author_source}</div>
                <div class="ai-box">
                    <div class="ai-title">✨ AI 초록 요약본</div>
                    <div class="ai-text">${paper.summary}</div>
                </div>
                <a href="${paper.link}" target="_blank" class="link-btn">
                    ${paper.origin_site} 원문 사이트로 이동하여 전체 내용 보기 ➔
                </a>
            `;
            listContainer.appendChild(card);
        });
    }
</script>

</body>
</html>
