<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북한산 논문 아카이브</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_APP_KEY&autoload=false"></script>
<style>
  :root{
    --bg:#f6f4ef;
    --ink:#1f2a1f;
    --line:#d9d3c4;
    --card:#ffffff;
    --cat-resource:#5b7a5b;
    --cat-disaster:#b4472e;
    --cat-tour:#3a6ea5;
    --cat-eco:#7a9a3e;
    --cat-culture:#9b6b34;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  header{
    padding:28px 24px 18px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0 0 4px;
    font-size:26px;
    letter-spacing:-0.5px;
  }
  header p{
    margin:0;
    color:#5a5a52;
    font-size:14px;
  }
  #layout{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:0;
  }
  @media (max-width: 900px){
    #layout{ grid-template-columns: 1fr; }
  }

  /* 좌측: 목록 */
  #panel{
    padding:20px 24px;
    border-right:1px solid var(--line);
  }
  #controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:14px;
  }
  .cat-btn{
    border:1px solid var(--line);
    background:var(--card);
    padding:6px 14px;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    color:var(--ink);
  }
  .cat-btn.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  #search{
    width:100%;
    padding:9px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:16px;
    font-size:14px;
  }
  #status{
    font-size:13px;
    color:#8a8578;
    margin-bottom:12px;
  }
  .paper{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:12px;
    cursor:pointer;
    transition:box-shadow .15s, border-color .15s;
  }
  .paper:hover{
    box-shadow:0 2px 10px rgba(0,0,0,.06);
  }
  .paper.selected{
    border-color:var(--ink);
  }
  .badge{
    display:inline-block;
    font-size:11px;
    color:#fff;
    padding:2px 9px;
    border-radius:999px;
    margin-bottom:8px;
  }
  .badge-자원조사{ background:var(--cat-resource); }
  .badge-재난{ background:var(--cat-disaster); }
  .badge-탐방{ background:var(--cat-tour); }
  .badge-생태{ background:var(--cat-eco); }
  .badge-역사문화{ background:var(--cat-culture); }
  .paper h3{
    margin:0 0 6px;
    font-size:16px;
    line-height:1.4;
    word-break:keep-all;
  }
  .meta{
    font-size:12.5px;
    color:#7a7a6f;
    margin-bottom:8px;
  }
  .meta span:not(:last-child)::after{
    content: " | ";
    color:#c9c2b0;
  }
  .summary{
    font-size:13.5px;
    line-height:1.6;
    color:#3a3a34;
    margin-bottom:8px;
  }
  .paper a{
    font-size:12.5px;
    color:var(--cat-tour);
    text-decoration:none;
  }
  #empty{
    padding:40px 10px;
    text-align:center;
    color:#8a8578;
    font-size:14px;
  }

  /* 우측: 상세 패널 */
  #detail{
    padding:20px 24px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  #detail-empty{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#a19b8a;
    font-size:14px;
    text-align:center;
    padding:40px;
  }
  #detail-content{
    display:none;
  }
  #detail-map{
    width:100%;
    height:220px;
    border-radius:10px;
    border:1px solid var(--line);
    margin-bottom:18px;
  }
  #detail-content h2{
    margin:6px 0 16px;
    font-size:20px;
    line-height:1.4;
  }
  .detail-row{
    margin-bottom:16px;
  }
  .detail-row .label{
    font-size:12px;
    color:#8a8578;
    margin-bottom:3px;
    font-weight:600;
  }
  .detail-row .value{
    font-size:14px;
    line-height:1.6;
    color:#2a2a24;
    white-space:pre-line;
  }
  #detail-link{
    display:inline-block;
    margin-top:4px;
    font-size:13px;
    color:var(--cat-tour);
    text-decoration:none;
  }
  #ai-summary-row .value, #ai-usage-row .value{
    background:#f1f0e8;
    border-left:3px solid var(--cat-resource);
    padding:10px 12px;
    border-radius:6px;
  }
  #ai-summary-row .label, #ai-usage-row .label{
    color:var(--cat-resource);
  }
</style>
</head>
<body>

<header>
  <h1>북한산 논문 아카이브</h1>
  <p id="status">불러오는 중…</p>
</header>

<div id="layout">
  <div id="panel">
    <input id="search" type="text" placeholder="제목·키워드로 검색">
    <div id="controls">
      <button class="cat-btn active" data-cat="전체">전체</button>
      <button class="cat-btn" data-cat="자원조사">자원조사</button>
      <button class="cat-btn" data-cat="재난">재난</button>
      <button class="cat-btn" data-cat="탐방">탐방</button>
      <button class="cat-btn" data-cat="생태">생태</button>
      <button class="cat-btn" data-cat="역사문화">역사문화</button>
    </div>
    <div id="list"></div>
    <div id="empty" style="display:none;">조건에 맞는 논문이 없습니다.</div>
  </div>

  <div id="detail">
    <div id="detail-empty">목록에서 논문을 선택하면<br>상세 정보가 여기에 표시됩니다.</div>
    <div id="detail-content">
      <div id="detail-map"></div>
      <span id="detail-badge" class="badge"></span>
      <h2 id="detail-title"></h2>
      <div class="detail-row">
        <div class="label">저자</div>
        <div class="value" id="detail-authors"></div>
      </div>
      <div class="detail-row">
        <div class="label">소속</div>
        <div class="value" id="detail-institution"></div>
      </div>
      <div class="detail-row">
        <div class="label">학술지정보</div>
        <div class="value" id="detail-journal"></div>
      </div>
      <div class="detail-row">
        <div class="label">발행정보</div>
        <div class="value" id="detail-pubinfo"></div>
      </div>
      <div class="detail-row">
        <div class="label">초록</div>
        <div class="value" id="detail-abstract"></div>
      </div>
      <div class="detail-row" id="ai-summary-row">
        <div class="label">AI 요약</div>
        <div class="value" id="detail-ai-summary"></div>
      </div>
      <div class="detail-row" id="ai-usage-row">
        <div class="label">AI 활용 방안 제안</div>
        <div class="value" id="detail-ai-usage"></div>
      </div>
      <div class="detail-row">
        <a id="detail-link" href="#" target="_blank" rel="noopener">원문 페이지에서 보기 →</a>
      </div>
    </div>
  </div>
</div>

<script>
let ALL_PAPERS = [];
let currentCat = "전체";
let detailMap, detailMarker;

function initDetailMap(lat, lng){
  const container = document.getElementById('detail-map');
  const center = new kakao.maps.LatLng(lat, lng);
  if(!detailMap){
    detailMap = new kakao.maps.Map(container, { center, level: 6 });
  } else {
    detailMap.setCenter(center);
  }
  if(detailMarker) detailMarker.setMap(null);
  detailMarker = new kakao.maps.Marker({ position: center, map: detailMap });
}

function selectPaper(p, el){
  document.querySelectorAll('.paper').forEach(n => n.classList.remove('selected'));
  if(el) el.classList.add('selected');

  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';

  document.getElementById('detail-badge').textContent = p.category;
  document.getElementById('detail-badge').className = `badge badge-${p.category}`;
  document.getElementById('detail-title').textContent = p.title;
  document.getElementById('detail-authors').textContent = p.authors || "정보 없음";
  document.getElementById('detail-institution').textContent = p.institution || "정보 없음";
  document.getElementById('detail-journal').textContent = p.journal || "정보 없음";
  document.getElementById('detail-pubinfo').textContent = p.pub_info || (p.year !== '-' ? p.year : "정보 없음");
  document.getElementById('detail-abstract').textContent = p.abstract || p.description || "정보 없음";

  const summaryRow = document.getElementById('ai-summary-row');
  const usageRow = document.getElementById('ai-usage-row');
  if(p.ai_summary){
    document.getElementById('detail-ai-summary').textContent = p.ai_summary;
    summaryRow.style.display = "block";
  } else {
    summaryRow.style.display = "none";
  }
  if(p.ai_usage){
    document.getElementById('detail-ai-usage').textContent = p.ai_usage;
    usageRow.style.display = "block";
  } else {
    usageRow.style.display = "none";
  }

  const link = document.getElementById('detail-link');
  if(p.url){
    link.href = p.url;
    link.style.display = "inline-block";
  } else {
    link.style.display = "none";
  }

  if(typeof kakao !== 'undefined' && p.location){
    kakao.maps.load(() => initDetailMap(p.location.lat, p.location.lng));
  }
}

function paperExcerpt(p){
  // 초록이 있으면 그중 한글 부분(첫 문단)만 발췌, 없으면 검색결과 스니펫으로 대체
  const source = p.abstract || p.description || "";
  if(!source) return "설명 정보가 없습니다.";
  const firstParagraph = source.split(/\n\s*\n/)[0].trim();
  const text = firstParagraph || source;
  return text.length > 150 ? text.slice(0, 150) + "…" : text;
}

function renderList(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = ALL_PAPERS.filter(p => {
    const catOk = currentCat === "전체" || p.category === currentCat;
    const text = `${p.title} ${p.description} ${p.abstract}`.toLowerCase();
    const qOk = !q || text.includes(q);
    return catOk && qOk;
  });

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  list.innerHTML = "";

  if(filtered.length === 0){
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    filtered.forEach(p => {
      const metaParts = [];
      if(p.year && p.year !== '-') metaParts.push(`<span>${p.year}</span>`);
      if(p.authors) metaParts.push(`<span>${p.authors}</span>`);
      if(p.journal) metaParts.push(`<span>${p.journal}</span>`);

      const el = document.createElement('div');
      el.className = "paper";
      el.innerHTML = `
        <span class="badge badge-${p.category}">${p.category}</span>
        <h3>${p.title}</h3>
        <div class="meta">${metaParts.join('') || '<span>정보 없음</span>'}</div>
        <div class="summary">${paperExcerpt(p)}</div>
        ${p.url ? `<a href="${p.url}" target="_blank" rel="noopener">원문 보기 →</a>` : ""}
      `;
      el.addEventListener('click', () => selectPaper(p, el));
      const linkEl = el.querySelector('a');
      if(linkEl) linkEl.addEventListener('click', (e) => e.stopPropagation());
      list.appendChild(el);
    });
  }
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderList();
  });
});
document.getElementById('search').addEventListener('input', renderList);

async function loadPapers(){
  const status = document.getElementById('status');
  try{
    const res = await fetch('papers.json', { cache: "no-store" });
    if(!res.ok) throw new Error("papers.json 없음");
    const data = await res.json();
    ALL_PAPERS = data.papers || [];
    status.textContent = `총 ${ALL_PAPERS.length}건 · 마지막 업데이트 ${data.updated || "-"}`;
  }catch(e){
    status.textContent = "papers.json을 아직 불러오지 못했습니다. GitHub Actions가 한 번 실행된 뒤 새로고침해 주세요.";
    ALL_PAPERS = [];
  }
  renderList();
}

loadPapers();
</script>

</body>
</html>
