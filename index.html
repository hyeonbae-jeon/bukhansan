<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>북한산 논문 아카이브</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_APP_KEY&autoload=false"></script>
<style>
  :root{
    --bg:#f6f4ef;
    --ink:#1f2a1f;
    --line:#d9d3c4;
    --card:#ffffff;
    --cat-resource:#5b7a5b;
    --cat-disaster:#b4472e;
    --cat-tour:#3a6ea5;
    --cat-eco:#7a9a3e;
    --cat-culture:#9b6b34;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  header{
    padding:28px 24px 18px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0 0 4px;
    font-size:26px;
    letter-spacing:-0.5px;
  }
  header p{
    margin:0;
    color:#5a5a52;
    font-size:14px;
  }
  #layout{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:0;
  }
  @media (max-width: 900px){
    #layout{ grid-template-columns: 1fr; }
  }
  #map{
    height: calc(100vh - 90px);
    min-height:420px;
    position: sticky;
    top:90px;
    border-right:1px solid var(--line);
  }
  #panel{
    padding:20px 24px;
  }
  #controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:14px;
  }
  .cat-btn{
    border:1px solid var(--line);
    background:var(--card);
    padding:6px 14px;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    color:var(--ink);
  }
  .cat-btn.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  #search{
    width:100%;
    padding:9px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    margin-bottom:16px;
    font-size:14px;
  }
  #status{
    font-size:13px;
    color:#8a8578;
    margin-bottom:12px;
  }
  .paper{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:12px;
    cursor:pointer;
    transition:box-shadow .15s;
  }
  .paper:hover{
    box-shadow:0 2px 10px rgba(0,0,0,.06);
  }
  .badge{
    display:inline-block;
    font-size:11px;
    color:#fff;
    padding:2px 9px;
    border-radius:999px;
    margin-bottom:8px;
  }
  .badge-자원조사{ background:var(--cat-resource); }
  .badge-재난{ background:var(--cat-disaster); }
  .badge-탐방{ background:var(--cat-tour); }
  .badge-생태{ background:var(--cat-eco); }
  .badge-역사문화{ background:var(--cat-culture); }
  .paper h3{
    margin:0 0 6px;
    font-size:16px;
    line-height:1.4;
  }
  .meta{
    font-size:12.5px;
    color:#7a7a6f;
    margin-bottom:8px;
  }
  .summary{
    font-size:13.5px;
    line-height:1.6;
    color:#3a3a34;
    margin-bottom:8px;
  }
  .paper a{
    font-size:12.5px;
    color:var(--cat-tour);
    text-decoration:none;
  }
  #empty{
    padding:40px 10px;
    text-align:center;
    color:#8a8578;
    font-size:14px;
  }
  #modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(30,28,20,.45);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  #modal-overlay.open{ display:flex; }
  #modal{
    background:#fff;
    border-radius:12px;
    max-width:600px;
    width:100%;
    max-height:85vh;
    overflow-y:auto;
    padding:26px 28px;
    position:relative;
  }
  #modal-close{
    position:absolute;
    top:14px;
    right:16px;
    border:none;
    background:none;
    font-size:20px;
    cursor:pointer;
    color:#7a7a6f;
  }
  #modal h2{
    margin:6px 30px 14px 0;
    font-size:19px;
    line-height:1.4;
  }
  .modal-row{
    margin-bottom:14px;
  }
  .modal-row .label{
    font-size:12px;
    color:#8a8578;
    margin-bottom:3px;
    font-weight:600;
  }
  .modal-row .value{
    font-size:14px;
    line-height:1.6;
    color:#2a2a24;
    white-space:pre-line;
  }
</style>
</head>
<body>

<header>
  <h1>북한산 논문 아카이브</h1>
  <p id="status">불러오는 중…</p>
</header>

<div id="layout">
  <div id="map"></div>
  <div id="panel">
    <input id="search" type="text" placeholder="제목·키워드로 검색">
    <div id="controls">
      <button class="cat-btn active" data-cat="전체">전체</button>
      <button class="cat-btn" data-cat="자원조사">자원조사</button>
      <button class="cat-btn" data-cat="재난">재난</button>
      <button class="cat-btn" data-cat="탐방">탐방</button>
      <button class="cat-btn" data-cat="생태">생태</button>
      <button class="cat-btn" data-cat="역사문화">역사문화</button>
    </div>
    <div id="list"></div>
    <div id="empty" style="display:none;">조건에 맞는 논문이 없습니다.</div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" aria-label="닫기">✕</button>
    <span id="modal-badge" class="badge"></span>
    <h2 id="modal-title"></h2>
    <div class="modal-row">
      <div class="label">저자</div>
      <div class="value" id="modal-authors"></div>
    </div>
    <div class="modal-row">
      <div class="label">소속</div>
      <div class="value" id="modal-institution"></div>
    </div>
    <div class="modal-row">
      <div class="label">학술지정보</div>
      <div class="value" id="modal-journal"></div>
    </div>
    <div class="modal-row">
      <div class="label">발행정보</div>
      <div class="value" id="modal-pubinfo"></div>
    </div>
    <div class="modal-row">
      <div class="label">초록</div>
      <div class="value" id="modal-abstract"></div>
    </div>
    <div class="modal-row" id="modal-link-row">
      <a id="modal-link" href="#" target="_blank" rel="noopener">네이버 학술정보 원문 페이지에서 보기 →</a>
    </div>
  </div>
</div>

<script>
let ALL_PAPERS = [];
let currentCat = "전체";
let map, markers = [];

function initMap(){
  const container = document.getElementById('map');
  const options = {
    center: new kakao.maps.LatLng(37.6585, 126.9770),
    level: 6
  };
  map = new kakao.maps.Map(container, options);
}

function clearMarkers(){
  markers.forEach(m => m.setMap(null));
  markers = [];
}

function renderMarkers(papers){
  clearMarkers();
  papers.forEach(p => {
    if(!p.location) return;
    const pos = new kakao.maps.LatLng(p.location.lat, p.location.lng);
    const marker = new kakao.maps.Marker({ position: pos, map: map });
    const info = new kakao.maps.InfoWindow({
      content: `<div style="padding:6px 10px;font-size:12px;max-width:220px;">${p.title}</div>`
    });
    kakao.maps.event.addListener(marker, 'mouseover', () => info.open(map, marker));
    kakao.maps.event.addListener(marker, 'mouseout', () => info.close());
    markers.push(marker);
  });
}

function panTo(loc){
  if(!map || !loc) return;
  map.panTo(new kakao.maps.LatLng(loc.lat, loc.lng));
}

function openModal(p){
  document.getElementById('modal-badge').textContent = p.category;
  document.getElementById('modal-badge').className = `badge badge-${p.category}`;
  document.getElementById('modal-title').textContent = p.title;
  document.getElementById('modal-authors').textContent = p.authors || "정보 없음";
  document.getElementById('modal-institution').textContent = p.institution || "정보 없음";
  document.getElementById('modal-journal').textContent = p.journal || "정보 없음";
  document.getElementById('modal-pubinfo').textContent = p.pub_info || "정보 없음";
  document.getElementById('modal-abstract').textContent = p.abstract || p.description || "정보 없음";
  const linkRow = document.getElementById('modal-link-row');
  const link = document.getElementById('modal-link');
  if(p.url){
    link.href = p.url;
    linkRow.style.display = "block";
  } else {
    linkRow.style.display = "none";
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if(e.target.id === 'modal-overlay') closeModal();
});

function renderList(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = ALL_PAPERS.filter(p => {
    const catOk = currentCat === "전체" || p.category === currentCat;
    const text = `${p.title} ${p.description}`.toLowerCase();
    const qOk = !q || text.includes(q);
    return catOk && qOk;
  });

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  list.innerHTML = "";

  if(filtered.length === 0){
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    filtered.forEach(p => {
      const el = document.createElement('div');
      el.className = "paper";
      el.innerHTML = `
        <span class="badge badge-${p.category}">${p.category}</span>
        <h3>${p.title}</h3>
        <div class="meta">${p.year !== '-' ? p.year : '연도 미상'}</div>
        <div class="summary">${p.description || "설명 정보가 없습니다."}</div>
        ${p.url ? `<a href="${p.url}" target="_blank" rel="noopener">원문 보기 →</a>` : ""}
      `;
      el.addEventListener('click', () => {
        panTo(p.location);
        openModal(p);
      });
      const linkEl = el.querySelector('a');
      if(linkEl) linkEl.addEventListener('click', (e) => e.stopPropagation());
      list.appendChild(el);
    });
  }

  if(typeof kakao !== 'undefined' && map){
    renderMarkers(filtered);
  }
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderList();
  });
});
document.getElementById('search').addEventListener('input', renderList);

async function loadPapers(){
  const status = document.getElementById('status');
  try{
    const res = await fetch('papers.json', { cache: "no-store" });
    if(!res.ok) throw new Error("papers.json 없음");
    const data = await res.json();
    ALL_PAPERS = data.papers || [];
    status.textContent = `총 ${ALL_PAPERS.length}건 · 마지막 업데이트 ${data.updated || "-"}`;
  }catch(e){
    status.textContent = "papers.json을 아직 불러오지 못했습니다. GitHub Actions가 한 번 실행된 뒤 새로고침해 주세요.";
    ALL_PAPERS = [];
  }
  renderList();
}

if(typeof kakao !== 'undefined'){
  kakao.maps.load(initMap);
}
loadPapers();
</script>

</body>
</html>
