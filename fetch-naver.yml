name: Fetch Bukhansan Papers (Naver)

on:
  workflow_dispatch: {}      # Actions 탭에서 수동 실행 버튼
  schedule:
    - cron: "0 21 * * 0"     # 매주 일요일 06:00 KST(UTC 21:00 토요일)에 자동 실행

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install requests

      - name: Run fetch script
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_naver.py

      - name: Commit papers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json
          git diff --staged --quiet || git commit -m "chore: update papers.json"
          git push
