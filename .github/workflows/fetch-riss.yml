name: Fetch RISS Papers

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install requests beautifulsoup4 lxml playwright

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run fetch script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_riss.py

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_*.html
          if-no-files-found: ignore

      - name: Check papers.json exists
        run: |
          ls -la papers.json 2>/dev/null || echo "papers.json 없음"

      - name: Commit papers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f papers.json
          git status
          git commit -m "Update papers.json [skip ci]" || echo "변경사항 없음"
          git push
