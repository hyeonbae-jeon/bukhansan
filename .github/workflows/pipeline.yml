name: Update Papers Pipeline

on:
  schedule:
    - cron: '0 2 * * 1'   # 매주 월요일 오전 11시 KST (UTC 02:00)
  workflow_dispatch:        # 수동 실행 버튼
    inputs:
      limit:
        description: '이번 실행에서 AI 분석할 논문 건수 (일일 한도 20건 이하로 자동 조정됨)'
        required: false
        default: '20'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    concurrency:
      group: papers-pipeline
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # ── Step 1: Collect papers from OpenAlex ──
      - name: Run Collector
        run: python collector.py
        env:
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}

      # ── Step 2: Enrich with AI analysis (Gemini) ──
      - name: Run Enricher
        run: python enricher.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          ENRICH_LIMIT: ${{ github.event.inputs.limit || '20' }}

      # ── Step 3: Build index ──
      - name: Run Indexer
        run: python indexer.py

      # ── Commit & push ──
      - name: Commit updated papers
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json raw_papers.json fetch_state.json enrich_state.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
            exit 0
          fi
          git commit -m "chore: update papers [$(date -u +%Y-%m-%d)]"
          # 다른 실행(스케줄/수동)과 겹쳐서 push가 거부될 경우를 대비해
          # 최신 원격 커밋을 rebase로 받아온 뒤 재시도합니다.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "push 성공"
              break
            fi
            echo "push 실패 — 원격 변경분을 받아온 뒤 재시도합니다 ($i/5)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((i * 5))
          done
