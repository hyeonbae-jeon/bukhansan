name: Fetch Bukhansan Papers (Naver)

on:
  workflow_dispatch: {}      # Actions 탭에서 수동 실행 버튼 (누를 때마다 다음 배치 진행)
  schedule:
    - cron: "0 21 * * *"     # 매일 06:00 KST(UTC 21:00)에 자동 실행 — 배치 방식이라 매일 조금씩만 처리함

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install requests beautifulsoup4

      - name: Run fetch script (one batch)
        run: python fetch_naver.py

      - name: Commit papers.json and fetch_state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json fetch_state.json
          git diff --staged --quiet || git commit -m "chore: update papers.json (batch)"
          git push
