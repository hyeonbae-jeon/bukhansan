name: Fetch National Park Papers (Naver)

on:
  workflow_dispatch: {}      # Actions 탭에서 수동 실행 버튼
  schedule:
    - cron: "0 21 * * 0"     # 매주 일요일 06:00 KST(UTC 21:00 토요일)에 자동 실행

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 300      # 국립공원 24개를 다 도는 데 시간이 오래 걸릴 수 있어 여유있게 설정
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install requests beautifulsoup4

      - name: Run fetch script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_naver.py

      - name: Commit papers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json
          git diff --staged --quiet || git commit -m "chore: update papers.json"
          git push
