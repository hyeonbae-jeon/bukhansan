name: Collect & Enrich Papers

on:
  schedule:
    - cron: '0 1 * * 1'   # 매주 월요일 오전 10시 KST (UTC+9)
  workflow_dispatch:
    inputs:
      max_openalex:
        description: 'OpenAlex 최대 수집 건수'
        default: '200'
      max_naver:
        description: 'Naver 최대 수집 건수'
        default: '100'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-generativeai

      - name: Run pipeline
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:     gemini-2.5-flash-lite
          OPENALEX_EMAIL:   ${{ secrets.OPENALEX_EMAIL }}
          MAX_OPENALEX:     ${{ github.event.inputs.max_openalex || '200' }}
          MAX_NAVER:        ${{ github.event.inputs.max_naver    || '100' }}
        run: python main.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json fetch_state.json
          git diff --staged --quiet || git commit -m "data: update papers $(date +'%Y-%m-%d')"
          git push
