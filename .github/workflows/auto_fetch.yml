name: Automatically Update Bukhansan Papers

on:
  schedule:
    - cron: '0 15 * * *' # 매일 한국 시간 밤 12시(UTC 15시)에 알아서 실행
  workflow_dispatch: # 관리자가 수동으로 '실행' 버튼을 눌러 즉시 업데이트 할 수도 있게 설정

jobs:
  build-and-crawl:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 가상환경 설정
      uses: actions/setup-python@v4
      with:
        python-python: '3.10'

    - name: 필요한 프로그램 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 네이버 추출 및 Gemini AI 요약 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python fetch_academic.py

    - name: 변경된 논문 데이터(json) 저장소에 강제 업데이트 및 배포
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add papers.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 자동 시스템: 최신 학술 정보 및 AI 요약본 업데이트" && git push)
