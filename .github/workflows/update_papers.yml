name: Update Papers Pipeline

on:
  workflow_dispatch: {}    # Actions 탭에서 수동 실행 버튼
  push:
    paths:
      - 'collector.py'
      - 'enricher.py'
      - 'indexer.py'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  update-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector
        run: python collector.py

      - name: Run enricher (AI analysis)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python enricher.py

      - name: Run indexer
        run: python indexer.py

      - name: Commit and push updated papers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: update papers.json [automated]"
          git push
